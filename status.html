<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
    <meta name="theme-color" content="#0d1b2a">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <title>Status — Tommy Skogstad</title>
    <style>
        :root {
            --navy:#0d1b2a; --blue1:#1b2d42; --blue2:#2e4260; --blue3:#4a6080;
            --blue4:#7a96b0; --blue5:#b8cad8; --blue6:#e4eaf0; --white:#f4f5f2;
            --green:#6D8345; --yellow:#F9A850; --red:#C35839;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--navy); color:var(--blue5); min-height:100vh; }
        header { max-width:1100px; margin:0 auto; padding:2.5rem 1rem 2rem; display:flex; align-items:center; justify-content:space-between; gap:1.5rem; }
        .header-brand { display:flex; align-items:center; gap:1.25rem; }
        .header-brand img { height:4rem; width:4rem; }
        .header-brand-text { display:flex; flex-direction:column; gap:4px; }
        .header-brand-name { font-size:1.4rem; font-weight:400; color:var(--white); letter-spacing:-0.02em; line-height:1; }
        .header-brand-sep { height:1px; background:var(--white); opacity:0.12; }
        .header-brand-sub { font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.14em; color:var(--blue4); text-transform:uppercase; }
        .header-nav { display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; }
        .header-nav a { font-family:'DM Mono',monospace; font-size:0.75rem; letter-spacing:0.08em; color:var(--blue3); text-decoration:none; padding:0.4rem 0.8rem; border:1px solid var(--blue2); border-radius:6px; transition:color 0.2s,border-color 0.2s; }
        .header-nav a:hover { color:var(--white); border-color:var(--blue4); }
        .header-nav a.active { color:var(--white); border-color:var(--blue4); background:var(--blue1); }
        main { max-width:1100px; margin:0 auto; padding:0 1rem 3rem; }
        .page-head { display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; margin-bottom:1.5rem; gap:0.5rem; }
        .page-head h1 { font-size:1.5rem; font-weight:500; color:var(--white); }
        .updated { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--blue4); }
        .updated .dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--green); margin-right:4px; animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

        .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(340px, 1fr)); gap:1rem; }
        .app-card { background:var(--blue1); border:1px solid var(--blue2); border-radius:12px; overflow:hidden; transition:border-color 0.2s, transform 0.2s; text-decoration:none; color:inherit; display:flex; flex-direction:column; }
        .app-card:hover { border-color:var(--blue4); transform:translateY(-2px); }
        .app-card.status-ok     { border-left:4px solid var(--green); }
        .app-card.status-warn   { border-left:4px solid var(--yellow); }
        .app-card.status-crit   { border-left:4px solid var(--red); }
        .app-card.status-unknown{ border-left:4px solid var(--blue3); }
        .app-head { padding:1rem 1.25rem 0.75rem; display:flex; align-items:center; justify-content:space-between; gap:0.5rem; }
        .app-title { font-size:1.05rem; font-weight:500; color:var(--white); }
        .app-sub { font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--blue3); letter-spacing:0.08em; text-transform:uppercase; }
        .status-pill { font-family:'DM Mono',monospace; font-size:0.65rem; padding:0.2rem 0.55rem; border-radius:9999px; background:var(--navy); letter-spacing:0.06em; text-transform:uppercase; }
        .status-pill.ok   { color:var(--green); border:1px solid rgba(109,131,69,0.4); }
        .status-pill.warn { color:var(--yellow); border:1px solid rgba(249,168,80,0.4); }
        .status-pill.crit { color:var(--red); border:1px solid rgba(195,88,57,0.4); }
        .status-pill.unknown { color:var(--blue4); border:1px solid var(--blue2); }

        .kpis { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--blue2); }
        .kpi { background:var(--blue1); padding:0.6rem 0.75rem; text-align:left; }
        .kpi-label { font-family:'DM Mono',monospace; font-size:0.55rem; color:var(--blue4); letter-spacing:0.08em; text-transform:uppercase; }
        .kpi-value { font-size:0.95rem; color:var(--white); font-weight:500; margin-top:2px; font-family:'DM Mono',monospace; }
        .kpi-value.ok   { color:var(--green); }
        .kpi-value.warn { color:var(--yellow); }
        .kpi-value.crit { color:var(--red); }

        .spark { padding:0.75rem 1rem 0; background:var(--blue1); }
        .spark svg { display:block; width:100%; height:28px; }
        .spark-label { display:flex; justify-content:space-between; font-family:'DM Mono',monospace; font-size:0.55rem; color:var(--blue3); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:2px; }

        .app-foot { padding:0.6rem 1rem; background:rgba(0,0,0,0.18); display:flex; justify-content:space-between; align-items:center; font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--blue4); }
        .concern-badges { display:flex; gap:0.3rem; flex-wrap:wrap; }
        .concern { padding:0.15rem 0.45rem; border-radius:4px; font-size:0.65rem; font-family:'DM Mono',monospace; }
        .concern.crit { background:rgba(195,88,57,0.18); color:var(--red); }
        .concern.high { background:rgba(249,168,80,0.18); color:var(--yellow); }
        .concern.med  { background:rgba(122,150,176,0.18); color:var(--blue5); }
        .concern.low  { background:rgba(74,96,128,0.18); color:var(--blue4); }
        .concern.info { background:rgba(74,96,128,0.12); color:var(--blue3); }

        .section { margin-top:2.5rem; }
        .section-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; padding-bottom:0.5rem; border-bottom:1px solid var(--blue1); }
        .section-header h2 { font-size:1.15rem; font-weight:500; color:var(--white); }
        .concerns-list { background:var(--blue1); border:1px solid var(--blue2); border-radius:10px; }
        .concern-row { padding:0.7rem 1rem; display:flex; align-items:center; gap:0.75rem; border-bottom:1px solid var(--blue2); font-size:0.85rem; }
        .concern-row:last-child { border-bottom:0; }
        .concern-row .sev { font-family:'DM Mono',monospace; font-size:0.65rem; padding:0.15rem 0.5rem; border-radius:4px; min-width:44px; text-align:center; flex-shrink:0; }
        .concern-row .app { font-family:'DM Mono',monospace; font-size:0.75rem; color:var(--blue4); min-width:110px; }
        .concern-row .title { flex:1; color:var(--blue5); }
        .concern-row a.link { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--blue3); text-decoration:none; }
        .concern-row a.link:hover { color:var(--blue5); }

        .empty { text-align:center; padding:2rem; color:var(--blue3); font-style:italic; }
        .error { text-align:center; padding:1rem; color:var(--red); background:rgba(195,88,57,0.1); border-radius:8px; }

        /* Issue-triage 24t widget */
        .triage-widget { background:var(--blue1); border:1px solid var(--blue2); border-radius:10px; padding:1rem; }
        .triage-summary { display:flex; gap:1.5rem; align-items:baseline; margin-bottom:1rem; padding-bottom:0.75rem; border-bottom:1px solid var(--blue2); flex-wrap:wrap; }
        .triage-summary .big { font-size:1.8rem; font-weight:500; color:var(--white); font-family:'DM Mono',monospace; }
        .triage-summary .label { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--blue3); text-transform:uppercase; letter-spacing:0.08em; }
        .triage-summary .pill { padding:0.15rem 0.5rem; border-radius:4px; font-family:'DM Mono',monospace; font-size:0.7rem; }
        .triage-summary .pill.ok { background:rgba(124,179,141,0.18); color:var(--green); }
        .triage-summary .pill.warn { background:rgba(249,168,80,0.18); color:var(--yellow); }
        .triage-summary .pill.crit { background:rgba(195,88,57,0.18); color:var(--red); }
        .triage-summary .pill.info { background:rgba(74,96,128,0.18); color:var(--blue4); }
        .triage-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:1rem; }
        .triage-block h4 { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--blue3); text-transform:uppercase; letter-spacing:0.08em; margin:0 0 0.5rem; font-weight:500; }
        .triage-row { display:flex; justify-content:space-between; font-size:0.8rem; padding:0.25rem 0; font-family:'DM Mono',monospace; }
        .triage-row .k { color:var(--blue5); }
        .triage-row .v { color:var(--white); }
        .triage-row .rate { color:var(--blue4); margin-left:0.4rem; font-size:0.7rem; }

        /* Sekundære apper — kompakte rader */
        .compact-list { background:var(--blue1); border:1px solid var(--blue2); border-radius:10px; overflow:hidden; }
        .compact-row { padding:0.6rem 0.9rem; display:flex; align-items:center; gap:0.75rem; border-bottom:1px solid var(--blue2); text-decoration:none; color:inherit; transition:background 0.15s; }
        .compact-row:last-child { border-bottom:0; }
        .compact-row:hover { background:rgba(0,0,0,0.18); }
        .compact-row .tier { font-family:'DM Mono',monospace; font-size:0.62rem; padding:0.1rem 0.4rem; border-radius:4px; background:var(--navy); color:var(--blue4); letter-spacing:0.05em; text-transform:uppercase; min-width:70px; text-align:center; }
        .compact-row .name { flex:1; font-size:0.9rem; color:var(--blue5); }
        .compact-row .name .slug { font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--blue3); margin-left:0.4rem; }
        .compact-row .meta { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--blue4); display:flex; gap:0.5rem; }
        .compact-row .status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
        .compact-row .status-dot.ok { background:var(--green); }
        .compact-row .status-dot.warn { background:var(--yellow); }
        .compact-row .status-dot.crit { background:var(--red); }
        .compact-row .status-dot.unknown { background:var(--blue3); }

        /* Shadow-modes widget */
        .shadow-table { width:100%; border-collapse:collapse; background:var(--blue1); border:1px solid var(--blue2); border-radius:10px; overflow:hidden; font-size:0.85rem; }
        .shadow-table thead th { text-align:left; font-family:'DM Mono',monospace; font-size:0.62rem; letter-spacing:0.08em; color:var(--blue4); text-transform:uppercase; padding:0.7rem 0.9rem; background:rgba(0,0,0,0.15); border-bottom:1px solid var(--blue2); font-weight:500; }
        .shadow-table tbody td { padding:0.65rem 0.9rem; border-bottom:1px solid var(--blue2); vertical-align:top; }
        .shadow-table tbody tr:last-child td { border-bottom:0; }
        .shadow-table tbody tr:hover td { background:rgba(0,0,0,0.12); }
        .shadow-name { color:var(--white); font-weight:500; }
        .shadow-desc { display:block; color:var(--blue3); font-size:0.72rem; margin-top:2px; font-family:'DM Mono',monospace; }
        .shadow-status { font-family:'DM Mono',monospace; font-size:0.7rem; display:inline-flex; align-items:center; gap:0.35rem; }
        .shadow-status .icon { font-size:0.85rem; line-height:1; }
        .shadow-verdict { font-family:'DM Mono',monospace; font-size:0.72rem; padding:0.15rem 0.5rem; border-radius:4px; display:inline-block; }
        .shadow-verdict.ready { background:rgba(109,131,69,0.2); color:var(--green); }
        .shadow-verdict.not-ready { background:rgba(122,150,176,0.15); color:var(--blue5); }
        .shadow-verdict.expired { background:rgba(249,168,80,0.18); color:var(--yellow); }
        .shadow-verdict.abandoned { background:rgba(195,88,57,0.15); color:var(--red); }
        .shadow-verdict.promoted { background:rgba(109,131,69,0.15); color:var(--blue5); }
        .shadow-verdict.planned { background:rgba(74,96,128,0.15); color:var(--blue4); }
        .shadow-num { font-family:'DM Mono',monospace; color:var(--white); white-space:nowrap; }
        .shadow-num.muted { color:var(--blue4); }
        .shadow-since { font-family:'DM Mono',monospace; font-size:0.75rem; color:var(--blue5); white-space:nowrap; }
        @media (max-width: 720px) {
            .shadow-table thead { display:none; }
            .shadow-table, .shadow-table tbody, .shadow-table tr, .shadow-table td { display:block; width:100%; }
            .shadow-table tr { padding:0.6rem 0.9rem; border-bottom:1px solid var(--blue2); }
            .shadow-table td { padding:0.15rem 0; border-bottom:0; }
            .shadow-table td::before { content:attr(data-label) ": "; font-family:'DM Mono',monospace; font-size:0.6rem; color:var(--blue4); text-transform:uppercase; letter-spacing:0.08em; margin-right:0.4rem; }
            .shadow-table td:first-child::before { content:""; margin-right:0; }
        }

        .banner { padding:0.75rem 1rem; background:rgba(249,168,80,0.12); border:1px solid rgba(249,168,80,0.3); border-radius:8px; margin-bottom:1.5rem; font-size:0.85rem; color:var(--yellow); display:flex; align-items:center; gap:0.5rem; }
        .banner strong { color:var(--white); }

        footer { text-align:center; padding:2rem 1rem; color:var(--blue3); font-size:0.85rem; border-top:1px solid var(--blue1); max-width:1100px; margin:0 auto; }
        footer a { transition:color 0.2s; text-decoration:none; color:inherit; }
        footer a:hover { color:var(--white); }
        @media (max-width: 640px) { .grid { grid-template-columns:1fr; } header { flex-direction:column; align-items:flex-start; } .kpis { grid-template-columns:repeat(2,1fr); } }
    </style>
</head>
<body>
    <div id="site-header"></div>
    <script src="/header.js?v=3"></script>

    <main>
        <div class="page-head">
            <h1>Status</h1>
            <div class="updated"><span class="dot"></span><span id="last-updated">laster...</span></div>
        </div>

        <div id="unclassified-banner"></div>

        <div id="overview-grid" class="grid">
            <div class="empty">Henter statusdata...</div>
        </div>

        <section class="section">
            <div class="section-header">
                <h2>Sekundære apper og biblioteker</h2>
            </div>
            <div id="secondary-list" class="compact-list">
                <div class="empty">Laster...</div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <h2>Åpne bekymringer</h2>
            </div>
            <div id="concerns-list" class="concerns-list">
                <div class="empty">Laster...</div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <h2>Issue-triage siste 24t</h2>
            </div>
            <div id="triage-window" class="triage-widget">
                <div class="empty">Laster...</div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <h2>Shadow-modes</h2>
            </div>
            <div id="shadow-modes">
                <div class="empty">Laster...</div>
            </div>
        </section>
    </main>

    <div id="site-footer"></div>
    <script src="/footer.js?v=3"></script>

    <script>
    (function() {
        var API = '/status-api';
        var POLL_MS = 60000; // 1 min

        // ----- Rendering helpers -----
        function el(tag, attrs, children) {
            var e = document.createElement(tag);
            for (var k in attrs) {
                if (k === 'class') e.className = attrs[k];
                else if (k === 'text') e.textContent = attrs[k];
                else if (k === 'html') e.innerHTML = attrs[k];
                else e.setAttribute(k, attrs[k]);
            }
            (children || []).forEach(function(c) { if (c) e.appendChild(c); });
            return e;
        }

        function minutesAgo(tsStr) {
            if (!tsStr) return null;
            var ts = new Date(tsStr.replace(' ', 'T') + (tsStr.indexOf('Z') < 0 ? 'Z' : ''));
            return Math.round((Date.now() - ts.getTime()) / 60000);
        }

        function ago(tsStr) {
            var m = minutesAgo(tsStr);
            if (m === null) return '—';
            if (m < 60) return m + 'm';
            if (m < 1440) return Math.round(m/60) + 't';
            return Math.round(m/1440) + 'd';
        }

        // Agreger en apps tilstand til ok/warn/crit
        function appStatus(a) {
            var h = a.health || {};
            var cf = a.cloudflare || {};
            var lh = a.lighthouse || {};
            var tls = a.tls || {};
            var c = a.concerns || {};
            if (h.status === 'down' || h.status === 'white-page') return 'crit';
            if (c.crit) return 'crit';
            if (c.high) return 'warn';
            if ((cf.errors_5xx || 0) > 30) return 'warn';
            if (tls.days_until_expiry !== undefined && tls.days_until_expiry < 14) return 'crit';
            if (tls.days_until_expiry !== undefined && tls.days_until_expiry < 30) return 'warn';
            if (h.status === 'degraded') return 'warn';
            if (lh.performance !== null && lh.performance !== undefined && lh.performance < 60) return 'warn';
            if (!h.status) return 'unknown';
            return 'ok';
        }

        // SVG sparkline for response_ms siste 24t
        function sparkline(points) {
            var NS = 'http://www.w3.org/2000/svg';
            var svg = document.createElementNS(NS, 'svg');
            svg.setAttribute('viewBox', '0 0 100 28');
            svg.setAttribute('preserveAspectRatio', 'none');
            if (!points || points.length < 2) {
                var t = document.createElementNS(NS, 'text');
                t.setAttribute('x', '50'); t.setAttribute('y', '18');
                t.setAttribute('text-anchor', 'middle');
                t.setAttribute('font-family', 'DM Mono, monospace');
                t.setAttribute('font-size', '7');
                t.setAttribute('fill', '#4a6080');
                t.textContent = 'for lite data';
                svg.appendChild(t);
                return svg;
            }
            var vals = points.map(function(p) { return p.response_ms || 0; });
            var max = Math.max.apply(null, vals) || 1;
            var min = Math.min.apply(null, vals);
            var range = max - min || 1;
            var path = '';
            points.forEach(function(p, i) {
                var x = (i / (points.length - 1)) * 100;
                var y = 26 - ((p.response_ms - min) / range) * 22;
                path += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';
            });
            // Area-fill
            var fill = document.createElementNS(NS, 'path');
            fill.setAttribute('d', path + 'L100 28 L0 28 Z');
            fill.setAttribute('fill', 'rgba(109,131,69,0.15)');
            svg.appendChild(fill);
            var line = document.createElementNS(NS, 'path');
            line.setAttribute('d', path);
            line.setAttribute('stroke', '#6D8345');
            line.setAttribute('stroke-width', '1.2');
            line.setAttribute('fill', 'none');
            svg.appendChild(line);
            // Marker for downs
            points.forEach(function(p, i) {
                if (p.status !== 'up' && p.status !== 'unknown') {
                    var x = (i / (points.length - 1)) * 100;
                    var dot = document.createElementNS(NS, 'circle');
                    dot.setAttribute('cx', x); dot.setAttribute('cy', '14');
                    dot.setAttribute('r', '2'); dot.setAttribute('fill', '#C35839');
                    svg.appendChild(dot);
                }
            });
            return svg;
        }

        function kpi(label, value, cls) {
            return el('div', { class:'kpi' }, [
                el('div', { class:'kpi-label', text: label }),
                el('div', { class:'kpi-value ' + (cls||''), text: value })
            ]);
        }

        function renderApp(a) {
            var status = appStatus(a);
            var h = a.health || {};
            var cf = a.cloudflare || {};
            var lh = a.lighthouse || {};
            var tls = a.tls || {};
            var gh = a.github || {};
            var concerns = a.concerns || {};

            // Header
            var pillText = status === 'crit' ? 'kritisk' : (status === 'warn' ? 'advarsel' : (status === 'unknown' ? 'ukjent' : 'ok'));
            var head = el('div', { class:'app-head' }, [
                el('div', {}, [
                    el('div', { class:'app-title', text: a.display_name || a.slug }),
                    el('div', { class:'app-sub', text: a.github_repo || a.slug })
                ]),
                el('span', { class:'status-pill ' + status, text: pillText })
            ]);

            // KPIs: helse/respons, Lighthouse-perf, Cloudflare 5xx, TLS, PRs, issues
            var perfCls = lh.performance >= 90 ? 'ok' : (lh.performance >= 70 ? '' : (lh.performance >= 50 ? 'warn' : 'crit'));
            var errCls = (cf.errors_5xx || 0) > 30 ? 'crit' : ((cf.errors_5xx || 0) > 5 ? 'warn' : '');
            var tlsCls = tls.days_until_expiry === undefined ? '' : (tls.days_until_expiry < 14 ? 'crit' : (tls.days_until_expiry < 30 ? 'warn' : ''));
            var kpis = el('div', { class:'kpis' }, [
                kpi('Respons', (h.response_ms != null ? h.response_ms + ' ms' : '—'),
                    h.status === 'up' ? 'ok' : (h.status ? 'crit' : '')),
                kpi('Lighthouse', lh.performance != null ? lh.performance : '—', perfCls),
                kpi('CF 24t', cf.requests != null ? cf.requests.toLocaleString('no-NO') : '—', ''),
                kpi('5xx', cf.errors_5xx != null ? cf.errors_5xx : '—', errCls),
                kpi('TLS', tls.days_until_expiry != null ? tls.days_until_expiry + 'd' : '—', tlsCls),
                kpi('PR / issues',
                    (gh.open_prs != null ? gh.open_prs : '?') + ' / ' + (gh.open_issues != null ? gh.open_issues : '?'),
                    (gh.ci_status && gh.ci_status !== 'success') ? 'warn' : '')
            ]);

            // Spark
            var sparkLabel = el('div', { class:'spark-label' }, [
                el('span', { text: 'Responstid 24t' }),
                el('span', { text: (a.health_24h || []).length + ' punkter' })
            ]);
            var spark = el('div', { class:'spark' }, [sparkLabel, sparkline(a.health_24h || [])]);

            // Foot: deploy-alder + concerns
            var concernEls = [];
            ['crit','high','med','low','info'].forEach(function(sev) {
                if (concerns[sev]) concernEls.push(el('span', { class:'concern ' + sev, text: sev + ' ' + concerns[sev] }));
            });
            var deployStr = a.last_deploy && a.last_deploy.ts ? 'sist deploy ' + ago(a.last_deploy.ts) : 'ingen deploy registrert';
            var foot = el('div', { class:'app-foot' }, [
                el('span', { text: deployStr }),
                el('div', { class:'concern-badges' }, concernEls)
            ]);

            var card = el('a', { class:'app-card status-' + status, href:'/status-app.html?app=' + encodeURIComponent(a.slug) },
                [head, spark, kpis, foot]);
            return card;
        }

        function renderOverview(data) {
            var grid = document.getElementById('overview-grid');
            grid.innerHTML = '';
            if (!data.apps || !data.apps.length) {
                grid.innerHTML = '<div class="empty">Ingen apper funnet</div>';
                return;
            }
            data.apps.forEach(function(a) { grid.appendChild(renderApp(a)); });
            var u = document.getElementById('last-updated');
            var gen = new Date(data.generated_at);
            u.textContent = 'oppdatert ' + gen.toLocaleTimeString('no-NO');
        }

        function renderConcerns(apps) {
            var list = document.getElementById('concerns-list');
            list.innerHTML = '';
            // Hent alle concerns fra alle apps ved å kalle /api/app/<slug> for hver — men det
            // er N+1. I stedet tar vi fra overview at hver app har concerns-tall, og viser en
            // lenke til drilldown. Full concern-liste kommer senere via en /api/concerns-rute.
            var total = 0;
            apps.forEach(function(a) {
                var c = a.concerns || {};
                Object.keys(c).forEach(function(sev) { total += c[sev]; });
            });
            if (total === 0) {
                list.innerHTML = '<div class="empty">Ingen åpne bekymringer 🎉</div>';
                return;
            }
            // Kall /api/app/<slug> parallelt og saml concerns
            Promise.all(apps.filter(function(a) {
                return Object.keys(a.concerns || {}).length > 0;
            }).map(function(a) {
                return fetch(API + '/api/app/' + a.slug).then(function(r) { return r.json(); });
            })).then(function(results) {
                var rows = [];
                results.forEach(function(r) {
                    (r.concerns_open || []).forEach(function(c) { rows.push(c); });
                });
                rows.sort(function(a, b) {
                    var order = { crit:1, high:2, med:3, low:4, info:5 };
                    return (order[a.severity]||9) - (order[b.severity]||9);
                });
                list.innerHTML = '';
                rows.forEach(function(c) {
                    var row = el('div', { class:'concern-row' }, [
                        el('span', { class:'sev concern ' + c.severity, text: c.severity }),
                        el('span', { class:'app', text: c.app_slug || '—' }),
                        el('span', { class:'title', text: c.title }),
                        c.link ? el('a', { class:'link', href: c.link, target:'_blank', text:'↗' }) : null
                    ]);
                    list.appendChild(row);
                });
                if (!rows.length) list.innerHTML = '<div class="empty">Ingen åpne bekymringer</div>';
            }).catch(function(err) {
                list.innerHTML = '<div class="error">Kunne ikke hente bekymringer: ' + err + '</div>';
            });
        }

        function renderSecondary(apps) {
            var list = document.getElementById('secondary-list');
            list.innerHTML = '';
            if (!apps.length) {
                list.innerHTML = '<div class="empty">Ingen sekundære apper</div>';
                return;
            }
            apps.forEach(function(a) {
                var status = appStatus(a);
                var h = a.health || {};
                var gh = a.github || {};
                var concerns = a.concerns || {};
                var c = Object.keys(concerns).reduce(function(s,k){ return s+concerns[k]; }, 0);
                var metaParts = [];
                if (gh.last_commit_ts) {
                    var days = Math.floor((Date.now() - new Date(gh.last_commit_ts).getTime()) / 86400000);
                    metaParts.push(days < 1 ? 'commit nå' : 'commit ' + days + 'd');
                }
                if (gh.open_prs != null || gh.open_issues != null) {
                    metaParts.push((gh.open_prs || 0) + 'pr ' + (gh.open_issues || 0) + 'i');
                }
                if (c > 0) metaParts.push(c + ' concern' + (c !== 1 ? 's' : ''));
                if (h.status && h.status !== 'unknown') metaParts.push(h.status);

                var row = el('a', { class:'compact-row', href:'/status-app.html?app=' + encodeURIComponent(a.slug) }, [
                    el('span', { class:'status-dot ' + status }),
                    el('span', { class:'tier', text: a.tier }),
                    el('span', { class:'name' }, [
                        document.createTextNode(a.display_name || a.slug),
                        el('span', { class:'slug', text: a.slug })
                    ]),
                    el('span', { class:'meta', text: metaParts.join(' · ') })
                ]);
                list.appendChild(row);
            });
        }

        function renderUnclassified(apps) {
            var banner = document.getElementById('unclassified-banner');
            banner.innerHTML = '';
            var unclassified = apps.filter(function(a) { return a.tier === 'unclassified'; });
            if (!unclassified.length) return;
            var names = unclassified.map(function(a) { return a.slug; }).join(', ');
            var msg = el('div', { class:'banner' }, [
                el('span', { text: '⚠' }),
                el('span', { html: '<strong>' + unclassified.length + ' repo trenger klassifisering:</strong> ' + names +
                    '. Kjør <code>status-report app set-tier &lt;slug&gt; &lt;tier&gt;</code> for å ordne.' })
            ]);
            banner.appendChild(msg);
        }

        // ----- Shadow-modes widget -----
        // Vurdering avhenger av status + match-rate ift. promotion-kriterier.
        // Returnerer { key, label, icon } hvor key brukes til sortering og farge.
        function shadowVerdict(m) {
            var crit = m.promotion_criteria || {};
            var threshold = (typeof crit.match_threshold === 'number') ? crit.match_threshold : 0.8;
            var minSamples = (typeof crit.min_samples === 'number') ? crit.min_samples : 50;
            var samples = m.last_sample_count || 0;
            var rate = (typeof m.last_match_rate === 'number') ? m.last_match_rate : null;

            if (m.status === 'promoted')  return { key:'promoted',  label:'Promotert', icon:'🟢' };
            if (m.status === 'expired')   return { key:'expired',   label:'Utløpt',    icon:'⚠️' };
            if (m.status === 'abandoned') return { key:'abandoned', label:'Forkastet', icon:'⚠️' };

            // active
            if (!m.started_at || samples === 0) {
                return { key:'planned', label:'Planlagt — ingen samples', icon:'⚫' };
            }
            if (samples < minSamples) {
                return { key:'not-ready', label:'For tidlig — for få samples', icon:'🟡' };
            }
            if (rate !== null && rate >= threshold) {
                return { key:'ready', label:'Klar for promotion', icon:'🟢' };
            }
            if (rate !== null && rate < threshold) {
                return { key:'not-ready', label:'Under terskel', icon:'🟡' };
            }
            return { key:'not-ready', label:'Evaluerer', icon:'🟡' };
        }

        // Sortering: active-ready (🟢) → active-not-ready (🟡) → planlagt (⚫) →
        // promoted/expired/abandoned (⚠️) nederst.
        var SHADOW_SORT_ORDER = {
            'ready': 1, 'not-ready': 2, 'planned': 3,
            'promoted': 4, 'expired': 5, 'abandoned': 6
        };

        function fmtMatchRate(rate) {
            if (rate === null || rate === undefined) return '—';
            var pct = rate * 100;
            // 0 desimaler hvis hele prosent, ellers 1.
            if (Math.abs(pct - Math.round(pct)) < 0.05) return pct.toFixed(0) + '%';
            return pct.toFixed(1) + '%';
        }

        function fmtShadowSince(tsStr) {
            if (!tsStr) return '—';
            var d = new Date(tsStr.replace(' ', 'T') + (tsStr.indexOf('Z') < 0 ? 'Z' : ''));
            if (isNaN(d.getTime())) return tsStr;
            // YYYY-MM-DD
            return d.toISOString().slice(0, 10);
        }

        function renderShadowModes(data) {
            var container = document.getElementById('shadow-modes');
            container.innerHTML = '';
            var modes = (data && data.shadow_modes) || [];
            if (!modes.length) {
                container.innerHTML = '<div class="empty">Ingen shadow-modes registrert</div>';
                return;
            }
            var rows = modes.map(function(m) {
                var verdict = shadowVerdict(m);
                return { mode: m, verdict: verdict };
            });
            rows.sort(function(a, b) {
                var oa = SHADOW_SORT_ORDER[a.verdict.key] || 9;
                var ob = SHADOW_SORT_ORDER[b.verdict.key] || 9;
                if (oa !== ob) return oa - ob;
                return (a.mode.name || '').localeCompare(b.mode.name || '');
            });

            var thead = el('thead', {}, [
                el('tr', {}, [
                    el('th', { text: 'Mode' }),
                    el('th', { text: 'Status' }),
                    el('th', { text: 'Aktiv siden' }),
                    el('th', { text: 'Samples' }),
                    el('th', { text: 'Match-rate' }),
                    el('th', { text: 'Vurdering' })
                ])
            ]);
            var tbody = el('tbody', {});
            rows.forEach(function(r) {
                var m = r.mode, v = r.verdict;
                var nameCell = el('td', { 'data-label': 'Mode' }, [
                    el('span', { class:'shadow-name', text: m.name || '—' }),
                    m.description ? el('span', { class:'shadow-desc', text: m.description }) : null
                ]);
                var statusCell = el('td', { 'data-label': 'Status' }, [
                    el('span', { class:'shadow-status' }, [
                        el('span', { class:'icon', text: v.icon }),
                        document.createTextNode(m.status || '—')
                    ])
                ]);
                var sinceCell = el('td', { 'data-label': 'Aktiv siden', class:'shadow-since',
                    text: fmtShadowSince(m.started_at) });
                var samplesCell = el('td', { 'data-label': 'Samples',
                    class: 'shadow-num' + (!m.last_sample_count ? ' muted' : ''),
                    text: m.last_sample_count != null ? String(m.last_sample_count) : '0' });
                var rateCell = el('td', { 'data-label': 'Match-rate',
                    class: 'shadow-num' + (m.last_match_rate == null ? ' muted' : ''),
                    text: fmtMatchRate(m.last_match_rate != null ? m.last_match_rate : null) });
                var verdictCell = el('td', { 'data-label': 'Vurdering' }, [
                    el('span', { class:'shadow-verdict ' + v.key, text: v.label })
                ]);
                var tr = el('tr', {}, [nameCell, statusCell, sinceCell, samplesCell, rateCell, verdictCell]);
                tbody.appendChild(tr);
            });
            var table = el('table', { class:'shadow-table' }, [thead, tbody]);
            container.appendChild(table);
        }

        function loadShadowModes() {
            fetch(API + '/api/shadow-modes')
                .then(function(r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(renderShadowModes)
                .catch(function(err) {
                    document.getElementById('shadow-modes').innerHTML =
                        '<div class="error">Kunne ikke hente shadow-modes: ' + err + '</div>';
                });
        }

        function renderTriageWindow(data) {
            var container = document.getElementById('triage-window');
            container.innerHTML = '';

            if (!data || !data.total) {
                container.innerHTML = '<div class="empty">Ingen issue-triage-data siste ' +
                    (data && data.window_hours || 24) + 't.</div>';
                return;
            }

            var outcomes = data.outcomes || {};
            var closed = outcomes.success || 0;
            var retries = outcomes.retry || 0;
            var failures = outcomes.failure || 0;

            // Summary-rad
            var summary = el('div', { class:'triage-summary' }, [
                el('span', { class:'big', text: String(data.total) }),
                el('span', { class:'label', text: 'issues behandlet' }),
                el('span', { class:'pill ok', text: closed + ' lukket' }),
                retries ? el('span', { class:'pill warn', text: retries + ' retry' }) : null,
                failures ? el('span', { class:'pill crit', text: failures + ' failure' }) : null,
                el('span', { class:'pill info', text: (data.escalations || 0) + ' flere forsøk', title: 'Issues som trengte mer enn én triage-runde (retries > 0)' }),
                el('span', { class:'pill warn', text: (data.model_escalations || 0) + ' modell-bom', title: 'Classifier valgte for lav modell — flyten gikk til diagnose/decompose/spawn_claude_on_failure' }),
                data.dynamic_active === false
                    ? el('span', { class:'pill info', text: 'ruting=av (shadow)' })
                    : null,
            ].filter(Boolean));
            container.appendChild(summary);

            var grid = el('div', { class:'triage-grid' });

            // Per klasse (med suksessrate)
            var classBlock = el('div', { class:'triage-block' }, [
                el('h4', { text: 'Per kompleksitet' }),
            ]);
            var classOrder = ['trivial', 'small', 'medium', 'large', 'critical', 'unknown'];
            var byClass = data.by_class || {};
            var rateByClass = data.success_rate_by_class || {};
            var hitByClass = data.classifier_hit_rate_by_class || {};
            classOrder.forEach(function(c) {
                if (!(c in byClass)) return;
                var rate = rateByClass[c];
                var hit = hitByClass[c];
                var vHtml = String(byClass[c]);
                if (rate !== undefined) {
                    vHtml += ' <span class="rate" title="Suksessrate">(' + Math.round(rate * 100) + '%)</span>';
                }
                if (hit !== undefined) {
                    vHtml += ' <span class="rate" title="Classifier-treff: ' + Math.round(hit * 100) + '% holdt rutet modell">🎯' + Math.round(hit * 100) + '%</span>';
                }
                var row = el('div', { class:'triage-row' }, [
                    el('span', { class:'k', text: c }),
                    el('span', { class:'v', html: vHtml }),
                ]);
                classBlock.appendChild(row);
            });
            grid.appendChild(classBlock);

            // Per modell
            var modelBlock = el('div', { class:'triage-block' }, [
                el('h4', { text: 'Per modell' }),
            ]);
            var modelKeys = Object.keys(data.by_model || {}).sort();
            modelKeys.forEach(function(m) {
                var row = el('div', { class:'triage-row' }, [
                    el('span', { class:'k', text: m }),
                    el('span', { class:'v', text: String(data.by_model[m]) }),
                ]);
                modelBlock.appendChild(row);
            });
            grid.appendChild(modelBlock);

            container.appendChild(grid);
        }

        function loadTriageWindow() {
            fetch(API + '/api/triage-24h')
                .then(function(r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(renderTriageWindow)
                .catch(function(err) {
                    document.getElementById('triage-window').innerHTML =
                        '<div class="error">Kunne ikke hente triage-data: ' + err + '</div>';
                });
        }

        function load() {
            // Primary for store kort
            var pPrimary = fetch(API + '/api/overview?tier=primary').then(function(r) {
                if (!r.ok) throw new Error('HTTP ' + r.status); return r.json();
            });
            // Sekundære for kompakt liste
            var pSecondary = fetch(API + '/api/overview?tier=secondary,lib,maintenance,unclassified').then(function(r) {
                if (!r.ok) throw new Error('HTTP ' + r.status); return r.json();
            });
            Promise.all([pPrimary, pSecondary])
                .then(function(results) {
                    var primary = results[0];
                    var secondary = results[1];
                    renderOverview(primary);
                    renderSecondary(secondary.apps);
                    renderUnclassified(secondary.apps);
                    // Concerns samler vi fra alle (primary + secondary)
                    renderConcerns(primary.apps.concat(secondary.apps));
                })
                .catch(function(err) {
                    document.getElementById('overview-grid').innerHTML =
                        '<div class="error">Kunne ikke hente status: ' + err + '</div>';
                    document.getElementById('last-updated').textContent = 'feil';
                });
            loadShadowModes();
            loadTriageWindow();
        }

        load();
        setInterval(load, POLL_MS);
    })();
    </script>
</body>
</html>
