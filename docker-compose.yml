name: tommytv

services:
  cloudflared:
    image: cloudflare/cloudflared:2026.6.0
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?Sett CLOUDFLARE_TUNNEL_TOKEN i .env}
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - tommytv-network
    depends_on:
      - nginx
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    ports:
      - "8880:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - tommytv-network
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'

  sparing-api:
    build:
      context: .
      dockerfile: Dockerfile.sparing-api
    restart: unless-stopped
    volumes:
      - ./public/sparing-data.json:/data/sparing-data.json
      - sparing-backups:/data/backups
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8881/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - tommytv-network
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: '0.05'

  status-api:
    build:
      context: .
      dockerfile: Dockerfile.status-api
    restart: unless-stopped
    environment:
      STATUS_DB: /data/status.db
      STATUS_API_PORT: "8882"
      TRIAGE_LOG_DIR: /triage-logs
    volumes:
      # RW-mount kreves fordi SQLite WAL må kunne opprette -wal/-shm.
      # PRAGMA query_only = 1 i status-api.py hindrer skrive-operasjoner.
      - ${STATUS_DATA_DIR:-/home/terminator/status-data}:/data
      # Read-only mount av issue-triage log-katalog for classifier-eval.jsonl
      - ${TRIAGE_LOG_DIR:-/home/terminator/log/issue-triage}:/triage-logs:ro
    ports:
      - "8882:8882"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8882/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - tommytv-network
    deploy:
      resources:
        limits:
          memory: 48M
          cpus: '0.10'

volumes:
  sparing-backups:

networks:
  tommytv-network:
    driver: bridge
