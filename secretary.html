<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
    <meta name="theme-color" content="#0d1b2a">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <title>Sekretær — Tommy Skogstad</title>
    <style>
        :root {
            --navy:   #0d1b2a;
            --blue1:  #1b2d42;
            --blue2:  #2e4260;
            --blue3:  #4a6080;
            --blue4:  #7a96b0;
            --blue5:  #b8cad8;
            --blue6:  #e4eaf0;
            --white:  #f4f5f2;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--blue5); min-height: 100vh; }
        header { max-width: 900px; margin: 0 auto; padding: 2.5rem 1rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1.5rem; }
        .header-brand { display: flex; align-items: center; gap: 1.25rem; }
        .header-brand img { height: 4rem; width: 4rem; }
        .header-brand-text { display: flex; flex-direction: column; gap: 4px; }
        .header-brand-name { font-size: 1.4rem; font-weight: 400; color: var(--white); letter-spacing: -0.02em; line-height: 1; }
        .header-brand-sep { height: 1px; background: var(--white); opacity: 0.12; }
        .header-brand-sub { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.14em; color: var(--blue4); text-transform: uppercase; }
        .header-nav { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .header-nav a { font-family: 'DM Mono', monospace; font-size: 0.75rem; letter-spacing: 0.08em; color: var(--blue3); text-decoration: none; padding: 0.4rem 0.8rem; border: 1px solid var(--blue2); border-radius: 6px; transition: color 0.2s, border-color 0.2s; }
        .header-nav a:hover { color: var(--white); border-color: var(--blue4); }
        .header-nav a.active { color: var(--white); border-color: var(--blue4); background: var(--blue1); }
        main { max-width: 900px; margin: 0 auto; padding: 0 1rem 3rem; }
        .section { margin-bottom: 2.5rem; }
        .section-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--blue1); }
        .section-header h2 { font-size: 1.25rem; font-weight: 500; color: var(--white); }
        .badge { font-family: 'DM Mono', monospace; font-size: 0.65rem; font-weight: 400; text-transform: uppercase; letter-spacing: 0.1em; padding: 0.2rem 0.6rem; border-radius: 9999px; }
        .badge-local { background: var(--blue1); color: var(--blue4); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
        .card { background: var(--blue1); border: 1px solid var(--blue2); border-radius: 12px; padding: 1.5rem; text-decoration: none; color: inherit; display: block; }
        footer { text-align: center; padding: 2rem 1rem; color: var(--blue3); font-size: 0.85rem; border-top: 1px solid var(--blue1); }
        footer a { transition: color 0.2s; text-decoration: none; }
        footer a:hover { color: var(--white); }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } header { flex-direction: column; align-items: flex-start; } }
    </style>
</head>
<body>
    <header>
        <a href="/" style="text-decoration: none; color: inherit;">
            <div class="header-brand">
                <img src="favicon.svg" alt="Tommy Skogstad">
                <div class="header-brand-text">
                    <div class="header-brand-name">Tommy Skogstad</div>
                    <div class="header-brand-sep"></div>
                    <div class="header-brand-sub">ingenior · data · elektro · ledelse · produktutvikling</div>
                </div>
            </div>
        </a>
        <nav class="header-nav">
            <a href="/">Dashboard</a>
            <a href="status.html">Status</a>
            <a href="secretary.html" class="active">Sekretær</a>
            <a href="heating.html">Varme &amp; Sikkerhet</a>
            <a href="bookmarks.html">Bokmerker</a>
        </nav>
    </header>

    <main>
        <section class="section">
            <div class="section-header">
                <h2>Sekretær — daglig oversikt</h2>
                <button onclick="refreshSecretary()" style="margin-left:auto;padding:4px 12px;border-radius:6px;border:1px solid var(--blue3);background:var(--blue1);color:var(--blue5);cursor:pointer;font-size:0.8rem;">Oppdater rapport</button>
            </div>
            <div id="secretary-dashboard" style="padding: 0 4px;">
                <p style="color:var(--blue4)">Laster sekretærrapport...</p>
            </div>
        </section>
    </main>

    <script>
        const SEC_API = 'http://nuc.tommy.tv:8860';
        const LABELS = ['Faktura', 'Reise', 'Git', 'Sameiet', 'Jobb', 'ENK'];

        loadSecretary();

        async function loadSecretary() {
            const dash = document.getElementById('secretary-dashboard');
            if (!dash) return;

            try {
                const [pendingRes, calendarsRes, reportRes] = await Promise.all([
                    fetch(SEC_API + '/api/pending').then(r => r.json()).catch(() => []),
                    fetch(SEC_API + '/api/calendars').then(r => r.json()).catch(() => []),
                    fetch(SEC_API + '/api/report').then(r => r.json()).catch(() => ({ date: '', content: '' }))
                ]);

                let html = '';

                if (pendingRes.length === 0) {
                    html += '<p style="color:var(--blue4);padding:8px 0;">Ingen ventende forslag.</p>';
                } else {
                    const calItems = pendingRes.filter(p => p.type === 'calendar');
                    const calUpdates = pendingRes.filter(p => p.type === 'calendar_update');
                    const calCleanups = pendingRes.filter(p => p.type === 'calendar_cleanup');
                    const draftItems = pendingRes.filter(p => p.type === 'draft' || p.type === 'reply');
                    const unsubItems = pendingRes.filter(p => p.type === 'unsubscribe');

                    if (calItems.length > 0) {
                        html += '<h3 style="color:var(--blue5);margin:12px 0 8px;font-size:0.95rem;">Kalenderforslag (' + calItems.length + ')</h3>';
                        calItems.forEach(p => {
                            const calOptions = calendarsRes.map(c =>
                                '<option value="' + c.id + '"' + (c.id === p.suggestedCalendarId ? ' selected' : '') + '>' + c.name + '</option>'
                            ).join('');
                            const title = p.suggestedTitle || p.subject;
                            const startStr = p.suggestedStart ? new Date(p.suggestedStart).toLocaleDateString('nb-NO', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
                            const loc = p.suggestedLocation || '';

                            html += '<div style="background:var(--blue1);border:1px solid var(--blue2);border-radius:8px;padding:12px;margin-bottom:8px;">';
                            html += '<div style="display:flex;justify-content:space-between;align-items:start;gap:8px;">';
                            html += '<div style="flex:1;">';
                            html += '<input id="title-' + p.id + '" value="' + escHtml(title) + '" style="width:100%;padding:3px 6px;border-radius:4px;border:1px solid var(--blue3);background:var(--blue2);color:var(--white);font-size:0.9rem;font-weight:500;" />';
                            if (startStr) html += '<div style="color:var(--blue5);font-size:0.8rem;margin-top:4px;">' + startStr + (loc ? ' — ' + escHtml(loc) : '') + '</div>';
                            html += '<div style="color:var(--blue4);font-size:0.75rem;margin-top:2px;">Fra: ' + escHtml(p.from || '') + '</div>';
                            if (p.reason) html += '<div style="color:var(--blue4);font-size:0.75rem;margin-top:2px;font-style:italic;">' + escHtml(p.reason) + '</div>';
                            html += '</div>';
                            html += '<div style="display:flex;flex-direction:column;gap:4px;min-width:180px;">';
                            html += '<select id="cal-' + p.id + '" style="padding:4px 6px;border-radius:4px;border:1px solid var(--blue3);background:var(--blue2);color:var(--white);font-size:0.8rem;">' + calOptions + '</select>';
                            html += '<div style="display:flex;gap:4px;">';
                            html += '<button onclick="approveCalendar(' + p.id + ')" style="flex:1;padding:4px 8px;border-radius:4px;border:none;background:#22c55e;color:white;cursor:pointer;font-size:0.8rem;">Godkjenn</button>';
                            html += '<button onclick="rejectItem(' + p.id + ',this)" style="flex:1;padding:4px 8px;border-radius:4px;border:none;background:#ef4444;color:white;cursor:pointer;font-size:0.8rem;">Avvis</button>';
                            html += '</div></div></div></div>';
                        });
                    }

                    if (calUpdates.length > 0) {
                        const deletes = calUpdates.filter(p => p.suggestedAction === 'delete');
                        const updates = calUpdates.filter(p => p.suggestedAction !== 'delete');

                        if (deletes.length > 0) {
                            html += '<h3 style="color:var(--blue5);margin:12px 0 8px;font-size:0.95rem;">Feilaktige kalenderoppføringer (slett)</h3>';
                            deletes.forEach(p => {
                                const existStart = p.existingStart ? new Date(p.existingStart).toLocaleDateString('nb-NO', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
                                html += '<div style="background:var(--blue1);border:1px solid #ef4444;border-radius:8px;padding:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;">';
                                html += '<div style="flex:1;"><div style="color:var(--white);font-size:0.85rem;text-decoration:line-through;">"' + escHtml(p.existingEventSummary || '') + '" — ' + existStart + '</div>';
                                html += '<div style="color:var(--blue4);font-size:0.7rem;font-style:italic;">' + escHtml((p.reason || '').substring(0, 120)) + '</div></div>';
                                html += '<div style="display:flex;gap:4px;">';
                                html += '<button onclick="deleteCalendarEvent(' + p.id + ')" style="padding:4px 8px;border-radius:4px;border:none;background:#ef4444;color:white;cursor:pointer;font-size:0.8rem;">Slett</button>';
                                html += '<button onclick="rejectItem(' + p.id + ',this)" style="padding:4px 8px;border-radius:4px;border:none;background:var(--blue2);color:var(--blue4);cursor:pointer;font-size:0.75rem;border:1px solid var(--blue3);">Behold</button>';
                                html += '</div></div>';
                            });
                        }

                        if (updates.length > 0) {
                            html += '<h3 style="color:var(--blue5);margin:12px 0 8px;font-size:0.95rem;">Kalender-korreksjoner</h3>';
                            updates.forEach(p => {
                                html += '<div style="background:var(--blue1);border:1px solid #eab308;border-radius:8px;padding:12px;margin-bottom:8px;">';
                                html += '<div style="color:#eab308;font-size:0.75rem;font-weight:500;margin-bottom:4px;">KORREKSJON</div>';
                                html += '<div style="color:var(--white);font-size:0.85rem;">Nåværende: <span style="text-decoration:line-through;">' + escHtml(p.existingEventSummary || '') + '</span></div>';
                                html += '<div style="color:#22c55e;font-size:0.85rem;">Foreslått: ' + escHtml(p.suggestedTitle || '') + '</div>';
                                if (p.reason) html += '<div style="color:var(--blue4);font-size:0.75rem;margin-top:4px;font-style:italic;">' + escHtml(p.reason) + '</div>';
                                html += '<div style="display:flex;gap:4px;margin-top:8px;">';
                                html += '<button onclick="approveCalendar(' + p.id + ')" style="padding:4px 8px;border-radius:4px;border:none;background:#22c55e;color:white;cursor:pointer;font-size:0.8rem;">Godkjenn</button>';
                                html += '<button onclick="rejectItem(' + p.id + ',this)" style="padding:4px 8px;border-radius:4px;border:none;background:#ef4444;color:white;cursor:pointer;font-size:0.8rem;">Avvis</button>';
                                html += '</div></div>';
                            });
                        }
                    }

                    if (calCleanups.length > 0) {
                        html += '<h3 style="color:var(--blue5);margin:12px 0 8px;font-size:0.95rem;">Duplikater i kalender (' + calCleanups.length + ')</h3>';
                        calCleanups.forEach(p => {
                            html += '<div style="background:var(--blue1);border:1px solid #f97316;border-radius:8px;padding:12px;margin-bottom:8px;">';
                            html += '<div style="color:#f97316;font-size:0.75rem;font-weight:500;margin-bottom:4px;">DUPLIKAT-OPPRYDDING</div>';
                            html += '<div style="color:#22c55e;font-size:0.85rem;">Beholde: ' + escHtml(p.keep?.summary || '?') + ' [' + escHtml(p.keep?.calendar || '') + ']</div>';
                            (p.delete || []).forEach(d => {
                                html += '<div style="color:#ef4444;font-size:0.8rem;text-decoration:line-through;">Slette: ' + escHtml(d.summary) + ' [' + escHtml(d.calendar || '') + ']</div>';
                            });
                            if (p.reason) html += '<div style="color:var(--blue4);font-size:0.75rem;margin-top:4px;font-style:italic;">' + escHtml(p.reason) + '</div>';
                            html += '<div style="display:flex;gap:4px;margin-top:8px;">';
                            html += '<button onclick="approveCleanup(' + p.id + ')" style="padding:4px 8px;border-radius:4px;border:none;background:#f97316;color:white;cursor:pointer;font-size:0.8rem;">Rydd opp</button>';
                            html += '<button onclick="rejectItem(' + p.id + ',this)" style="padding:4px 8px;border-radius:4px;border:none;background:var(--blue2);color:var(--blue4);cursor:pointer;font-size:0.8rem;border:1px solid var(--blue3);">Behold alle</button>';
                            html += '</div></div>';
                        });
                    }

                    if (unsubItems.length > 0) {
                        html += '<h3 style="color:var(--blue5);margin:12px 0 8px;font-size:0.95rem;">Foreslåtte avmeldinger</h3>';
                        unsubItems.forEach(p => {
                            html += '<div style="background:var(--blue1);border:1px solid var(--blue2);border-radius:8px;padding:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;">';
                            html += '<div style="flex:1;"><div style="color:var(--white);font-size:0.85rem;">' + escHtml(p.subject || '') + '</div>';
                            html += '<div style="color:var(--blue4);font-size:0.75rem;">' + escHtml(p.from || '') + '</div>';
                            if (p.reason) html += '<div style="color:var(--blue4);font-size:0.7rem;font-style:italic;">' + escHtml(p.reason) + '</div></div>';
                            html += '<button onclick="rejectItem(' + p.id + ',this)" style="padding:4px 10px;border-radius:4px;border:1px solid #ef4444;background:transparent;color:#ef4444;cursor:pointer;font-size:0.75rem;">Meld av</button>';
                            html += '</div>';
                        });
                    }

                    if (draftItems.length > 0) {
                        html += '<h3 style="color:var(--blue5);margin:12px 0 8px;font-size:0.95rem;">E-poster som krever svar</h3>';
                        draftItems.forEach(p => {
                            html += '<div style="background:var(--blue1);border:1px solid var(--blue2);border-radius:8px;padding:12px;margin-bottom:8px;">';
                            html += '<div style="color:var(--white);font-weight:500;">' + escHtml(p.subject || '') + '</div>';
                            html += '<div style="color:var(--blue4);font-size:0.8rem;margin-top:2px;">Fra: ' + escHtml(p.from || '') + '</div>';
                            html += '<div style="color:var(--blue4);font-size:0.8rem;margin-top:4px;">' + escHtml((p.snippet || '').substring(0, 150)) + '</div>';
                            if (p.suggestedReply) html += '<div style="color:var(--blue5);font-size:0.8rem;margin-top:4px;padding:6px;background:var(--blue2);border-radius:4px;">Forslag: ' + escHtml(p.suggestedReply) + '</div>';
                            html += '<div style="margin-top:8px;display:flex;gap:4px;align-items:end;">';
                            html += '<textarea id="reply-' + p.id + '" placeholder="Skriv svar..." style="flex:1;padding:6px;border-radius:4px;border:1px solid var(--blue3);background:var(--blue2);color:var(--white);font-size:0.8rem;min-height:50px;resize:vertical;">' + escHtml(p.suggestedReply || '') + '</textarea>';
                            html += '<div style="display:flex;flex-direction:column;gap:4px;">';
                            html += '<button onclick="createDraft(' + p.id + ')" style="padding:4px 8px;border-radius:4px;border:none;background:#3b82f6;color:white;cursor:pointer;font-size:0.8rem;">Lag utkast</button>';
                            html += '<button onclick="rejectItem(' + p.id + ',this)" style="padding:4px 8px;border-radius:4px;border:none;background:#ef4444;color:white;cursor:pointer;font-size:0.8rem;">Avvis</button>';
                            html += '</div></div></div>';
                        });
                    }
                }

                // Fakturaer
                try {
                    const invoices = await fetch(SEC_API + '/api/invoices').then(r => r.json()).catch(() => []);
                    if (invoices.length > 0) {
                        html += '<h3 style="color:var(--blue5);margin:12px 0 8px;font-size:0.95rem;">Fakturaer siste 7 dager (' + invoices.length + ')</h3>';
                        invoices.forEach(inv => {
                            html += '<div style="background:var(--blue1);border:1px solid var(--blue2);border-radius:8px;padding:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;">';
                            html += '<div style="flex:1;"><div style="color:var(--white);font-size:0.85rem;">' + escHtml(inv.subject.substring(0, 80)) + '</div>';
                            html += '<div style="color:var(--blue4);font-size:0.75rem;">' + escHtml(inv.from.substring(0, 50)) + ' — ' + escHtml(inv.date.substring(0, 16)) + '</div></div>';
                            html += '<div style="display:flex;gap:4px;align-items:center;">';
                            if (inv.hasAttachment) html += '<a href="' + SEC_API + '/api/invoices/' + inv.id + '/attachment" style="padding:4px 10px;border-radius:4px;background:var(--blue2);color:var(--blue5);text-decoration:none;font-size:0.75rem;border:1px solid var(--blue3);">Last ned</a>';
                            html += '<button onclick="dismissInvoice(\'' + inv.id + '\',this)" style="padding:4px 10px;border-radius:4px;border:1px solid #22c55e;background:transparent;color:#22c55e;cursor:pointer;font-size:0.75rem;">Behandlet</button>';
                            html += '</div></div>';
                        });
                    }
                } catch(e) {}

                // Label-trening
                html += '<div style="margin-top:12px;border-top:1px solid var(--blue2);padding-top:8px;">';
                html += '<button onclick="toggleTraining()" style="padding:4px 12px;border-radius:6px;border:1px solid var(--blue3);background:var(--blue1);color:var(--blue5);cursor:pointer;font-size:0.8rem;">Label-trening (siste 100 e-poster)</button>';
                html += '<div id="training-section" style="display:none;margin-top:8px;max-height:400px;overflow-y:auto;"></div>';
                html += '</div>';

                // Rapport-sammendrag
                if (reportRes.content) {
                    const lines = reportRes.content.split('\n');
                    const statsLines = lines.filter(l => l.startsWith('- '));
                    if (statsLines.length > 0) {
                        html += '<div style="color:var(--blue4);font-size:0.75rem;padding:8px 0;border-top:1px solid var(--blue2);margin-top:8px;">';
                        html += 'Rapport ' + reportRes.date + ' — ' + statsLines.join(' | ');
                        html += '</div>';
                    }
                }

                dash.innerHTML = html || '<p style="color:var(--blue4)">Ingen data.</p>';
            } catch (err) {
                dash.innerHTML = '<p style="color:#ef4444;">Kunne ikke laste sekretærdata: ' + err.message + '</p>';
            }
        }

        function refreshSecretary() {
            const dash = document.getElementById('secretary-dashboard');
            if (dash) dash.innerHTML = '<p style="color:var(--blue4)">Oppdaterer...</p>';
            fetch(SEC_API + '/api/run', { method: 'POST' })
                .then(() => setTimeout(loadSecretary, 2000))
                .catch(() => loadSecretary());
        }

        async function approveCalendar(id) {
            const calSelect = document.getElementById('cal-' + id);
            const titleInput = document.getElementById('title-' + id);
            const calendarId = calSelect ? calSelect.value : null;
            const title = titleInput ? titleInput.value.trim() : null;
            try {
                const res = await fetch(SEC_API + '/api/approve/' + id, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ calendarId, title })
                });
                const data = await res.json();
                if (data.success) loadSecretary();
                else alert(data.message || data.error || 'Kunne ikke opprette event');
            } catch (err) { alert('Feil: ' + err.message); }
        }

        async function rejectItem(id, btn) {
            try {
                await fetch(SEC_API + '/api/reject/' + id, { method: 'POST' });
                if (btn) btn.closest('div[style*="background:var(--blue1)"]').remove();
            } catch (err) { alert('Feil: ' + err.message); }
        }

        async function deleteCalendarEvent(id) {
            if (!confirm('Slette denne kalenderoppføringen?')) return;
            try {
                const res = await fetch(SEC_API + '/api/delete-event/' + id, { method: 'POST' });
                const data = await res.json();
                if (data.success) loadSecretary();
                else if (data.message) { alert(data.message); loadSecretary(); }
                else alert('Feil: ' + (data.error || 'Kunne ikke slette'));
            } catch (err) { alert('Feil: ' + err.message); }
        }

        async function approveCleanup(id) {
            if (!confirm('Slette duplikatene?')) return;
            try {
                const res = await fetch(SEC_API + '/api/cleanup/' + id, { method: 'POST' });
                const data = await res.json();
                if (data.success) { alert(data.deleted + ' duplikat(er) slettet'); loadSecretary(); }
                else alert('Feil: ' + (data.error || 'Ukjent'));
            } catch (err) { alert('Feil: ' + err.message); }
        }

        async function createDraft(id) {
            const textarea = document.getElementById('reply-' + id);
            const text = textarea ? textarea.value.trim() : '';
            if (!text) { alert('Skriv et svar først.'); return; }
            try {
                const res = await fetch(SEC_API + '/api/draft/' + id, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ replyText: text })
                });
                const data = await res.json();
                if (data.success) { alert('Utkast opprettet i Gmail Kladder.'); loadSecretary(); }
                else alert('Feil: ' + (data.error || 'Ukjent'));
            } catch (err) { alert('Feil: ' + err.message); }
        }

        async function dismissInvoice(messageId, btn) {
            try {
                await fetch(SEC_API + '/api/invoices/' + messageId + '/dismiss', { method: 'POST' });
                if (btn) btn.closest('div[style*="background:var(--blue1)"]').remove();
            } catch (err) { alert('Feil: ' + err.message); }
        }

        async function toggleTraining() {
            const section = document.getElementById('training-section');
            if (section.style.display !== 'none') { section.style.display = 'none'; return; }
            section.style.display = '';
            section.innerHTML = '<p style="color:var(--blue4)">Laster e-poster...</p>';
            try {
                const data = await fetch(SEC_API + '/api/training').then(r => r.json());
                let h = '';
                data.emails.forEach(email => {
                    h += '<div style="background:var(--blue1);border:1px solid var(--blue2);border-radius:6px;padding:8px;margin-bottom:4px;display:flex;align-items:center;gap:8px;">';
                    h += '<div style="flex:1;min-width:0;"><div style="color:var(--white);font-size:0.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escHtml(email.subject.substring(0, 60)) + '</div>';
                    h += '<div style="color:var(--blue4);font-size:0.7rem;">' + escHtml(email.from.substring(0, 40)) + '</div></div>';
                    h += '<div style="display:flex;gap:2px;flex-wrap:wrap;">';
                    LABELS.forEach(label => {
                        const active = email.labelNames.includes(label);
                        h += '<button onclick="toggleLabel(\'' + email.id + '\',\'' + label + '\',this)" style="padding:2px 6px;border-radius:3px;border:1px solid ' + (active ? '#22c55e' : 'var(--blue3)') + ';background:' + (active ? '#22c55e22' : 'transparent') + ';color:' + (active ? '#22c55e' : 'var(--blue4)') + ';cursor:pointer;font-size:0.65rem;">' + label + '</button>';
                    });
                    h += '</div></div>';
                });
                section.innerHTML = h;
            } catch (err) { section.innerHTML = '<p style="color:#ef4444;">Feil: ' + err.message + '</p>'; }
        }

        async function toggleLabel(messageId, label, btn) {
            const row = btn.closest('div[style*="background:var(--blue1)"]');
            const buttons = row.querySelectorAll('button');
            const currentLabels = [];
            buttons.forEach(b => {
                if (b.style.borderColor === 'rgb(34, 197, 94)' || b.style.borderColor === '#22c55e') currentLabels.push(b.textContent);
            });
            const idx = currentLabels.indexOf(label);
            if (idx >= 0) currentLabels.splice(idx, 1); else currentLabels.push(label);
            try {
                await fetch(SEC_API + '/api/training/' + messageId, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ labels: currentLabels })
                });
                const isActive = currentLabels.includes(label);
                btn.style.borderColor = isActive ? '#22c55e' : 'var(--blue3)';
                btn.style.background = isActive ? '#22c55e22' : 'transparent';
                btn.style.color = isActive ? '#22c55e' : 'var(--blue4)';
            } catch (err) { alert('Feil: ' + err.message); }
        }

        function escHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
    </script>
</body>
</html>
