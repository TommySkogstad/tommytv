<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
    <meta name="theme-color" content="#0d1b2a">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <title>App-status — Tommy Skogstad</title>
    <style>
        :root {
            --navy:#0d1b2a; --blue1:#1b2d42; --blue2:#2e4260; --blue3:#4a6080;
            --blue4:#7a96b0; --blue5:#b8cad8; --blue6:#e4eaf0; --white:#f4f5f2;
            --green:#6D8345; --yellow:#F9A850; --red:#C35839; --blue-accent:#3A78A6;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--navy); color:var(--blue5); min-height:100vh; }
        header { max-width:1200px; margin:0 auto; padding:2.5rem 1rem 2rem; display:flex; align-items:center; justify-content:space-between; gap:1.5rem; }
        .header-brand { display:flex; align-items:center; gap:1.25rem; }
        .header-brand img { height:4rem; width:4rem; }
        .header-brand-text { display:flex; flex-direction:column; gap:4px; }
        .header-brand-name { font-size:1.4rem; font-weight:400; color:var(--white); letter-spacing:-0.02em; line-height:1; }
        .header-brand-sep { height:1px; background:var(--white); opacity:0.12; }
        .header-brand-sub { font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.14em; color:var(--blue4); text-transform:uppercase; }
        .header-nav { display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; }
        .header-nav a { font-family:'DM Mono',monospace; font-size:0.75rem; letter-spacing:0.08em; color:var(--blue3); text-decoration:none; padding:0.4rem 0.8rem; border:1px solid var(--blue2); border-radius:6px; transition:color 0.2s,border-color 0.2s; }
        .header-nav a:hover { color:var(--white); border-color:var(--blue4); }
        .header-nav a.active { color:var(--white); border-color:var(--blue4); background:var(--blue1); }

        main { max-width:1200px; margin:0 auto; padding:0 1rem 3rem; }
        .breadcrumb { font-family:'DM Mono',monospace; font-size:0.75rem; color:var(--blue3); margin-bottom:1rem; }
        .breadcrumb a { color:var(--blue4); text-decoration:none; }
        .breadcrumb a:hover { color:var(--white); }

        .hero { display:flex; justify-content:space-between; align-items:flex-start; gap:1.5rem; flex-wrap:wrap; padding:1rem 0 1.5rem; border-bottom:1px solid var(--blue1); margin-bottom:2rem; }
        .hero h1 { font-size:1.75rem; font-weight:500; color:var(--white); }
        .hero .sub { font-family:'DM Mono',monospace; font-size:0.75rem; color:var(--blue4); margin-top:0.3rem; }
        .hero-links { display:flex; gap:0.5rem; flex-wrap:wrap; }
        .hero-links a { font-family:'DM Mono',monospace; font-size:0.7rem; padding:0.35rem 0.7rem; color:var(--blue5); border:1px solid var(--blue2); border-radius:6px; text-decoration:none; transition:all 0.2s; }
        .hero-links a:hover { border-color:var(--blue4); color:var(--white); }

        .kpi-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:0.75rem; margin-bottom:2rem; }
        .kpi { background:var(--blue1); border:1px solid var(--blue2); border-radius:10px; padding:1rem 1.15rem; }
        .kpi-label { font-family:'DM Mono',monospace; font-size:0.55rem; color:var(--blue4); letter-spacing:0.1em; text-transform:uppercase; }
        .kpi-value { font-size:1.4rem; font-weight:500; color:var(--white); margin-top:0.35rem; font-family:'DM Mono',monospace; }
        .kpi-value.ok   { color:var(--green); }
        .kpi-value.warn { color:var(--yellow); }
        .kpi-value.crit { color:var(--red); }
        .kpi-sub { font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--blue3); margin-top:0.2rem; }

        .section { margin-bottom:2rem; }
        .section h2 { font-size:1.1rem; font-weight:500; color:var(--white); margin-bottom:0.75rem; padding-bottom:0.4rem; border-bottom:1px solid var(--blue1); }
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
        @media (max-width: 900px) { .grid-2 { grid-template-columns:1fr; } }

        .card { background:var(--blue1); border:1px solid var(--blue2); border-radius:10px; padding:1rem 1.15rem; }
        .card-title { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--blue4); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.75rem; display:flex; justify-content:space-between; }
        .chart-wrap { position:relative; height:200px; }
        .chart-wrap canvas { max-height:200px; }

        /* Tables */
        table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        table th, table td { text-align:left; padding:0.5rem 0.5rem; border-bottom:1px solid var(--blue2); }
        table th { font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--blue4); text-transform:uppercase; letter-spacing:0.08em; font-weight:400; }
        table tr:last-child td { border-bottom:0; }
        table td.num { font-family:'DM Mono',monospace; text-align:right; color:var(--blue5); }
        table td.tag { font-family:'DM Mono',monospace; font-size:0.75rem; }

        .pill { display:inline-block; padding:0.1rem 0.5rem; border-radius:4px; font-family:'DM Mono',monospace; font-size:0.65rem; }
        .pill.ok   { background:rgba(109,131,69,0.18); color:var(--green); }
        .pill.warn { background:rgba(249,168,80,0.18); color:var(--yellow); }
        .pill.crit { background:rgba(195,88,57,0.18); color:var(--red); }
        .pill.info { background:rgba(122,150,176,0.18); color:var(--blue5); }
        .pill.neutral { background:var(--navy); color:var(--blue4); }

        .concern-row { padding:0.6rem 0; border-bottom:1px solid var(--blue2); display:flex; gap:0.75rem; align-items:center; }
        .concern-row:last-child { border-bottom:0; }
        .concern-row .sev { min-width:40px; text-align:center; }
        .concern-row .title { flex:1; font-size:0.9rem; color:var(--blue5); }
        .concern-row .meta { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--blue3); }

        .work-row { padding:0.4rem 0; border-bottom:1px solid var(--blue2); display:flex; gap:0.5rem; font-size:0.8rem; align-items:center; }
        .work-row:last-child { border-bottom:0; }
        .work-row .ts { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--blue3); min-width:85px; }
        .work-row .kind { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--blue4); min-width:60px; }
        .work-row .sum { flex:1; color:var(--blue5); }

        .empty { padding:1.2rem; text-align:center; color:var(--blue3); font-style:italic; font-size:0.85rem; }
        .error { padding:1rem; text-align:center; color:var(--red); background:rgba(195,88,57,0.1); border-radius:8px; }

        footer { text-align:center; padding:2rem 1rem; color:var(--blue3); font-size:0.85rem; border-top:1px solid var(--blue1); max-width:1200px; margin:0 auto; }
        footer a { transition:color 0.2s; text-decoration:none; color:inherit; }
        footer a:hover { color:var(--white); }
        @media (max-width: 640px) { header { flex-direction:column; align-items:flex-start; } }
    </style>
</head>
<body>
    <div id="site-header"></div>
    <script src="/header.js?v=3"></script>

    <main>
        <div class="breadcrumb">
            <a href="/status.html">← Tilbake til status</a>
        </div>
        <div id="content">
            <div class="empty">Laster...</div>
        </div>
    </main>

    <div id="site-footer"></div>
    <script src="/footer.js?v=3"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
    (function() {
        var API = '/status-api';
        var params = new URLSearchParams(location.search);
        var slug = params.get('app');

        if (!slug) {
            document.getElementById('content').innerHTML =
                '<div class="error">Mangler ?app=&lt;slug&gt; i URL</div>';
            return;
        }

        // Common Chart.js config
        Chart.defaults.color = '#7a96b0';
        Chart.defaults.borderColor = '#2e4260';
        Chart.defaults.font.family = "'DM Sans', sans-serif";

        function el(tag, attrs, children) {
            var e = document.createElement(tag);
            for (var k in attrs || {}) {
                if (k === 'class') e.className = attrs[k];
                else if (k === 'text') e.textContent = attrs[k];
                else if (k === 'html') e.innerHTML = attrs[k];
                else e.setAttribute(k, attrs[k]);
            }
            (children || []).forEach(function(c) { if (c) e.appendChild(c); });
            return e;
        }

        function ago(tsStr) {
            if (!tsStr) return '—';
            var ts = new Date(tsStr.replace(' ', 'T') + (tsStr.indexOf('Z') < 0 ? 'Z' : ''));
            var m = Math.round((Date.now() - ts.getTime()) / 60000);
            if (m < 60) return m + 'm';
            if (m < 1440) return Math.round(m/60) + 't';
            return Math.round(m/1440) + 'd';
        }

        function classify(value, okTh, warnTh, inverse) {
            if (value == null) return '';
            if (inverse) {
                if (value <= okTh) return 'ok';
                if (value <= warnTh) return 'warn';
                return 'crit';
            }
            if (value >= okTh) return 'ok';
            if (value >= warnTh) return 'warn';
            return 'crit';
        }

        // Render
        function renderHero(d) {
            var app = d.app;
            var health = (d.health_24h || []).slice(-1)[0] || {};
            var lastDeploy = (d.latest_deploys || [])[0];
            var gh = (d.github_latest || [])[0] || {};
            var tls = (d.tls_latest || [])[0] || {};
            var lh = (d.lighthouse_history || [])[0] || {};

            var links = el('div', { class:'hero-links' });
            if (app.prod_url) links.appendChild(el('a', { href: app.prod_url, target:'_blank', text:'Prod ↗' }));
            if (app.dev_url) links.appendChild(el('a', { href: app.dev_url, target:'_blank', text:'Dev ↗' }));
            if (app.github_repo) links.appendChild(el('a', { href:'https://github.com/' + app.github_repo, target:'_blank', text:'GitHub ↗' }));

            var hero = el('div', { class:'hero' }, [
                el('div', {}, [
                    el('h1', { text: app.display_name || app.slug }),
                    el('div', { class:'sub', text: (app.tier || '—') + ' · ' + (app.github_repo || '—') })
                ]),
                links
            ]);

            // KPIs
            var perfCls = classify(lh.performance, 90, 70);
            var kpis = el('div', { class:'kpi-row' }, [
                kpiBox('Helse', health.status || '—',
                       'respons ' + (health.response_ms != null ? health.response_ms + ' ms' : '—'),
                       health.status === 'up' ? 'ok' : (health.status ? 'crit' : '')),
                kpiBox('Lighthouse perf', lh.performance != null ? lh.performance : '—',
                       'sist ' + ago(lh.ts), perfCls),
                kpiBox('Åpne PR / issues',
                       (gh.open_prs != null ? gh.open_prs : '?') + ' / ' + (gh.open_issues != null ? gh.open_issues : '?'),
                       'CI ' + (gh.ci_status || '—'),
                       gh.ci_status === 'success' ? 'ok' : (gh.ci_status ? 'crit' : '')),
                kpiBox('TLS-utløp', tls.days_until_expiry != null ? tls.days_until_expiry + ' dager' : '—',
                       tls.domain || '',
                       classify(tls.days_until_expiry, 60, 30, false)),
                kpiBox('Bekymringer', (d.concerns_open || []).length,
                       'aktiv',
                       (d.concerns_open || []).some(function(c) { return c.severity === 'crit' || c.severity === 'high'; }) ? 'warn' : ''),
                kpiBox('Planer', (d.plans_active || []).length, 'pågår', '')
            ]);

            var deploySub = lastDeploy ? (lastDeploy.commit_sha || '').substring(0,7) + ' ' + ago(lastDeploy.ts) : 'ingen';
            kpis.appendChild(kpiBox('Siste deploy', lastDeploy ? lastDeploy.status : '—', deploySub,
                lastDeploy && lastDeploy.status === 'ok' ? 'ok' : (lastDeploy ? 'warn' : '')));

            return el('div', {}, [hero, kpis]);
        }

        function kpiBox(label, value, sub, cls) {
            return el('div', { class:'kpi' }, [
                el('div', { class:'kpi-label', text: label }),
                el('div', { class:'kpi-value ' + (cls||''), text: value }),
                sub ? el('div', { class:'kpi-sub', text: sub }) : null
            ]);
        }

        // Versioner-table
        function renderVersions(versions) {
            var rows = versions.map(function(v) {
                return el('tr', {}, [
                    el('td', { class:'tag', text: v.package }),
                    el('td', { class:'num', text: v.version }),
                    el('td', { text: ago(v.ts), class:'num' })
                ]);
            });
            if (!rows.length) return el('div', { class:'empty', text:'Ingen versjonsdata enda' });
            return el('table', {}, [
                el('thead', {}, [el('tr', {}, [
                    el('th', { text:'Pakke' }),
                    el('th', { text:'Versjon' }),
                    el('th', { text:'Alder' })
                ])]),
                el('tbody', {}, rows)
            ]);
        }

        function renderConcerns(concerns) {
            if (!concerns.length) return el('div', { class:'empty', text:'Ingen åpne bekymringer' });
            var wrap = el('div');
            concerns.forEach(function(c) {
                wrap.appendChild(el('div', { class:'concern-row' }, [
                    el('span', { class:'sev pill ' + c.severity, text: c.severity }),
                    el('div', { class:'title' }, [
                        el('div', { text: c.title }),
                        el('div', { class:'meta', text:
                            (c.type || '') +
                            ' · ' + (c.source || 'manuell') +
                            (c.source_ref ? ' · ' + c.source_ref : '') +
                            ' · ' + ago(c.created_at)
                        })
                    ]),
                    c.link ? el('a', { class:'meta', href: c.link, target:'_blank', text:'↗' }) : null
                ]));
            });
            return wrap;
        }

        function renderPlans(plans) {
            if (!plans.length) return el('div', { class:'empty', text:'Ingen aktive planer' });
            var wrap = el('div');
            plans.forEach(function(p) {
                wrap.appendChild(el('div', { class:'concern-row' }, [
                    el('span', { class:'sev pill neutral', text:'P' + p.priority }),
                    el('div', { class:'title' }, [
                        el('div', { text: p.title }),
                        el('div', { class:'meta', text:
                            (p.type || '') + ' · ' + (p.status || '') +
                            (p.sprint_id ? ' · sprint ' + p.sprint_id : '') +
                            (p.target_date ? ' · innen ' + p.target_date : '')
                        })
                    ])
                ]));
            });
            return wrap;
        }

        function renderWork(work) {
            if (!work.length) return el('div', { class:'empty', text:'Ingen aktivitet' });
            var wrap = el('div');
            work.forEach(function(w) {
                var sevCls = w.severity === 'error' ? 'crit' :
                             w.severity === 'warn' ? 'warn' :
                             w.severity === 'ok' ? 'ok' : 'info';
                wrap.appendChild(el('div', { class:'work-row' }, [
                    el('span', { class:'ts', text: ago(w.ts) }),
                    el('span', { class:'kind pill ' + sevCls, text: w.kind }),
                    el('span', { class:'sum', text: (w.actor ? '[' + w.actor + '] ' : '') + w.summary })
                ]));
            });
            return wrap;
        }

        function renderTenants(tenants) {
            var rows = tenants.map(function(t) {
                var errCls = (t.errors_5xx || 0) > 10 ? 'crit' : (t.errors_5xx || 0) > 0 ? 'warn' : '';
                var active = t.requests > 10;
                return el('tr', {}, [
                    el('td', { class:'tag', text: t.hostname || '—' }),
                    el('td', {}, [el('span', {
                        class:'pill ' + (active ? 'ok' : 'neutral'),
                        text: active ? 'aktiv' : 'lav trafikk'
                    })]),
                    el('td', { class:'num', text: (t.requests != null ? t.requests.toLocaleString('no-NO') : '—') }),
                    el('td', { class:'num', text: (t.unique_visitors != null ? t.unique_visitors.toLocaleString('no-NO') : '—') }),
                    el('td', { class:'num ' + errCls, text: (t.errors_5xx != null ? t.errors_5xx : '—') }),
                    el('td', { class:'num', text: (t.errors_4xx != null ? t.errors_4xx : '—') }),
                    el('td', { class:'num', text: (t.cache_hit_pct != null ? t.cache_hit_pct + '%' : '—') })
                ]);
            });
            var table = el('table', {}, [
                el('thead', {}, [el('tr', {}, [
                    el('th', { text:'Hostname' }),
                    el('th', { text:'Status' }),
                    el('th', { text:'Requests' }),
                    el('th', { text:'Unike' }),
                    el('th', { text:'5xx' }),
                    el('th', { text:'4xx' }),
                    el('th', { text:'Cache hit' })
                ])]),
                el('tbody', {}, rows)
            ]);
            return el('section', { class:'section' }, [
                el('h2', { text:'Aktive tenants (siste døgn)' }),
                el('div', { class:'card' }, [table])
            ]);
        }

        function renderDeploys(deploys) {
            if (!deploys.length) return el('div', { class:'empty', text:'Ingen deploys registrert enda' });
            var rows = deploys.map(function(d) {
                var cls = d.status === 'ok' ? 'ok' : d.status === 'failed' ? 'crit' : 'warn';
                return el('tr', {}, [
                    el('td', { text: ago(d.ts) }),
                    el('td', {}, [el('span', { class:'pill ' + cls, text: d.status })]),
                    el('td', { class:'tag', text: (d.commit_sha || '—').substring(0,7) }),
                    el('td', { class:'tag', text: d.slot || '—' }),
                    el('td', { class:'num', text: d.duration_s != null ? d.duration_s + 's' : '—' }),
                    el('td', { text: d.actor || '—' })
                ]);
            });
            return el('table', {}, [
                el('thead', {}, [el('tr', {}, [
                    el('th', { text:'Når' }), el('th', { text:'Status' }),
                    el('th', { text:'Commit' }), el('th', { text:'Slot' }),
                    el('th', { text:'Varighet' }), el('th', { text:'Actor' })
                ])]),
                el('tbody', {}, rows)
            ]);
        }

        // ---- Charts (Chart.js) ----
        function chartCard(title, subline) {
            var canvas = el('canvas');
            var wrap = el('div', { class:'chart-wrap' }, [canvas]);
            return {
                card: el('div', { class:'card' }, [
                    el('div', { class:'card-title' }, [
                        el('span', { text: title }),
                        subline ? el('span', { text: subline }) : null
                    ]),
                    wrap
                ]),
                canvas: canvas
            };
        }

        function buildHealthChart(canvas, points) {
            return new Chart(canvas, {
                type: 'line',
                data: {
                    labels: points.map(function(p) { return p.ts.substring(5, 16); }),
                    datasets: [{
                        label: 'Responstid (ms)',
                        data: points.map(function(p) { return p.response_ms; }),
                        borderColor: '#6D8345',
                        backgroundColor: 'rgba(109,131,69,0.15)',
                        fill: true,
                        tension: 0.25,
                        pointRadius: 0,
                        pointHoverRadius: 4
                    }]
                },
                options: chartOpts({ yTitle: 'ms', yBeginAtZero: true })
            });
        }

        function buildCloudflareChart(canvas, points) {
            return new Chart(canvas, {
                type: 'bar',
                data: {
                    labels: points.map(function(p) { return p.ts; }),
                    datasets: [
                        { label: 'Requests', data: points.map(function(p) { return p.value; }),
                          backgroundColor: '#3A78A6', yAxisID:'y' },
                        { label: '5xx', data: points.map(function(p) { return p.errors || 0; }),
                          backgroundColor: '#C35839', yAxisID:'y1' }
                    ]
                },
                options: chartOpts({
                    scales: {
                        y: { position:'left', beginAtZero: true, title:{ display:true, text:'Requests' } },
                        y1: { position:'right', beginAtZero: true, grid:{ drawOnChartArea:false },
                              title:{ display:true, text:'5xx' } }
                    }
                })
            });
        }

        function buildLighthouseChart(canvas, points) {
            // Gruppe per URL → 4 serier (perf/a11y/best/seo) for primær-URL (flest punkter)
            var byUrl = {};
            points.forEach(function(p) {
                if (!byUrl[p.url]) byUrl[p.url] = [];
                byUrl[p.url].push(p);
            });
            var topUrl = Object.keys(byUrl).sort(function(a,b) { return byUrl[b].length - byUrl[a].length; })[0];
            var series = byUrl[topUrl] || [];
            return new Chart(canvas, {
                type: 'line',
                data: {
                    labels: series.map(function(p) { return p.ts.substring(5, 10); }),
                    datasets: [
                        { label:'Perf',  data: series.map(function(p) { return p.value; }),
                          borderColor:'#F9A850', tension:0.3, pointRadius:3 },
                        { label:'A11y',  data: series.map(function(p) { return p.accessibility; }),
                          borderColor:'#6D8345', tension:0.3, pointRadius:3 },
                        { label:'Best',  data: series.map(function(p) { return p.best_practices; }),
                          borderColor:'#3A78A6', tension:0.3, pointRadius:3 },
                        { label:'SEO',   data: series.map(function(p) { return p.seo; }),
                          borderColor:'#7a96b0', tension:0.3, pointRadius:3 }
                    ]
                },
                options: chartOpts({ yTitle: 'score', yMax: 100, subtitle: topUrl })
            });
        }

        function buildGithubChart(canvas, points) {
            return new Chart(canvas, {
                type: 'line',
                data: {
                    labels: points.map(function(p) { return p.ts.substring(5, 16); }),
                    datasets: [
                        { label:'Åpne PRs', data: points.map(function(p) { return p.open_prs; }),
                          borderColor:'#3A78A6', tension:0.25, pointRadius:0 },
                        { label:'Åpne issues', data: points.map(function(p) { return p.open_issues; }),
                          borderColor:'#F9A850', tension:0.25, pointRadius:0 }
                    ]
                },
                options: chartOpts({ yBeginAtZero: true })
            });
        }

        function chartOpts(overrides) {
            overrides = overrides || {};
            var opts = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels:{ font:{ size: 10 }, boxWidth: 10, color:'#b8cad8' } },
                    tooltip: { mode:'index', intersect:false }
                },
                interaction: { mode:'nearest', axis:'x', intersect:false },
                scales: {
                    x: { ticks:{ font:{ size:9 }, maxRotation:0, autoSkip:true, maxTicksLimit:8 }, grid:{ color:'#2e4260' } },
                    y: { ticks:{ font:{ size:10 } }, grid:{ color:'#2e4260' } }
                }
            };
            if (overrides.scales) opts.scales = Object.assign({}, opts.scales, overrides.scales);
            if (overrides.yTitle) opts.scales.y.title = { display:true, text: overrides.yTitle };
            if (overrides.yBeginAtZero) opts.scales.y.beginAtZero = true;
            if (overrides.yMax) opts.scales.y.max = overrides.yMax;
            if (overrides.subtitle) opts.plugins.subtitle = { display:true, text: overrides.subtitle, font:{ size:9 }, color:'#4a6080' };
            return opts;
        }

        // ---- Main ----
        function load() {
            document.title = 'Status · ' + slug;
            fetch(API + '/api/app/' + encodeURIComponent(slug))
                .then(function(r) {
                    if (r.status === 404) throw new Error('Ukjent app: ' + slug);
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(function(d) { render(d); })
                .catch(function(err) {
                    document.getElementById('content').innerHTML =
                        '<div class="error">' + err + '</div>';
                });
        }

        function render(d) {
            var root = document.getElementById('content');
            root.innerHTML = '';

            root.appendChild(renderHero(d));

            // Charts rad 1: helse + CF
            var s1 = el('section', { class:'section' }, [
                el('h2', { text:'Trafikk og helse' }),
                el('div', { class:'grid-2' })
            ]);
            var healthCard = chartCard('Responstid', 'siste 24 timer');
            var cfCard = chartCard('Cloudflare-trafikk', 'siste 30 dager');
            s1.lastChild.appendChild(healthCard.card);
            s1.lastChild.appendChild(cfCard.card);
            root.appendChild(s1);

            // Charts rad 2: Lighthouse + GitHub
            var s2 = el('section', { class:'section' }, [
                el('h2', { text:'Kvalitet og arbeid' }),
                el('div', { class:'grid-2' })
            ]);
            var lhCard = chartCard('Lighthouse', 'siste 30 dager');
            var ghCard = chartCard('PR/issues over tid', 'siste 7 dager');
            s2.lastChild.appendChild(lhCard.card);
            s2.lastChild.appendChild(ghCard.card);
            root.appendChild(s2);

            // Grid rad 3: Concerns + Plans + Versions
            var s3 = el('section', { class:'section' }, [
                el('div', { class:'grid-2' }, [
                    el('div', { class:'card' }, [
                        el('div', { class:'card-title' }, [el('span', { text:'Åpne bekymringer' })]),
                        renderConcerns(d.concerns_open || [])
                    ]),
                    el('div', { class:'card' }, [
                        el('div', { class:'card-title' }, [el('span', { text:'Aktive planer' })]),
                        renderPlans(d.plans_active || [])
                    ])
                ])
            ]);
            root.appendChild(s3);

            // Tenants-seksjon (kun for apper med flere hostnames)
            var tenants = d.cloudflare_tenants_latest || [];
            if (tenants.length > 1) {
                root.appendChild(renderTenants(tenants));
            }

            var s4 = el('section', { class:'section' }, [
                el('h2', { text:'Versjoner og deploys' }),
                el('div', { class:'grid-2' }, [
                    el('div', { class:'card' }, [
                        el('div', { class:'card-title' }, [el('span', { text:'Pakke-versjoner' })]),
                        renderVersions(d.versions || [])
                    ]),
                    el('div', { class:'card' }, [
                        el('div', { class:'card-title' }, [el('span', { text:'Siste deploys' })]),
                        renderDeploys(d.latest_deploys || [])
                    ])
                ])
            ]);
            root.appendChild(s4);

            var s5 = el('section', { class:'section' }, [
                el('h2', { text:'Nylig aktivitet' }),
                el('div', { class:'card' }, [renderWork((d.recent_work || []).slice(0, 30))])
            ]);
            root.appendChild(s5);

            // Render charts async (fetch series)
            fetchSeries('health', 1).then(function(p) { buildHealthChart(healthCard.canvas, p); });
            fetchSeries('cloudflare', 30).then(function(p) { buildCloudflareChart(cfCard.canvas, p); });
            fetchSeries('lighthouse', 30).then(function(p) { buildLighthouseChart(lhCard.canvas, p); });
            fetchSeries('github', 7).then(function(p) { buildGithubChart(ghCard.canvas, p); });
        }

        function fetchSeries(metric, days) {
            return fetch(API + '/api/series/' + slug + '/' + metric + '?days=' + days)
                .then(function(r) { return r.ok ? r.json() : { points: [] }; })
                .then(function(d) { return d.points || []; });
        }

        load();
    })();
    </script>
</body>
</html>
