<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
    <meta name="theme-color" content="#0d1b2a">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <title>Audio — Tommy Skogstad</title>
    <style>
        :root { --navy:#0d1b2a; --blue1:#1b2d42; --blue2:#2e4260; --blue3:#4a6080; --blue4:#7a96b0; --blue5:#b8cad8; --blue6:#e4eaf0; --white:#f4f5f2; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--navy); color:var(--blue5); min-height:100vh; }
        header { max-width:900px; margin:0 auto; padding:2.5rem 1rem 2rem; display:flex; align-items:center; justify-content:space-between; gap:1.5rem; }
        .header-brand { display:flex; align-items:center; gap:1.25rem; }
        .header-brand img { height:4rem; width:4rem; }
        .header-brand-text { display:flex; flex-direction:column; gap:4px; }
        .header-brand-name { font-size:1.4rem; font-weight:400; color:var(--white); letter-spacing:-0.02em; line-height:1; }
        .header-brand-sep { height:1px; background:var(--white); opacity:0.12; }
        .header-brand-sub { font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.14em; color:var(--blue4); text-transform:uppercase; }
        .header-nav { display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; }
        .header-nav a { font-family:'DM Mono',monospace; font-size:0.75rem; letter-spacing:0.08em; color:var(--blue3); text-decoration:none; padding:0.4rem 0.8rem; border:1px solid var(--blue2); border-radius:6px; transition:color 0.2s,border-color 0.2s; }
        .header-nav a:hover { color:var(--white); border-color:var(--blue4); }
        .header-nav a.active { color:var(--white); border-color:var(--blue4); background:var(--blue1); }
        main { max-width:900px; margin:0 auto; padding:0 1rem 3rem; }
        .section { margin-bottom:2.5rem; }
        .section-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; padding-bottom:0.5rem; border-bottom:1px solid var(--blue1); }
        .section-header h2 { font-size:1.25rem; font-weight:500; color:var(--white); }
        .badge { font-family:'DM Mono',monospace; font-size:0.65rem; text-transform:uppercase; letter-spacing:0.1em; padding:0.2rem 0.6rem; border-radius:9999px; background:var(--blue1); color:var(--blue4); }
        .speaker-card { background:var(--blue1); border:1px solid var(--blue2); border-radius:12px; padding:1.25rem; margin-bottom:0.75rem; transition:border-color 0.2s; }
        .speaker-card.is-slave { opacity:0.6; border-left:3px solid var(--blue3); margin-left:2rem; }
        .speaker-card.is-master { border-left:3px solid #6D8345; }
        .speaker-card.is-playing { border-color:var(--blue4); }
        .btn { font-family:'DM Mono',monospace; font-size:0.7rem; background:var(--navy); border:1px solid var(--blue2); color:var(--blue4); padding:0.25rem 0.5rem; border-radius:4px; cursor:pointer; transition:all 0.15s; }
        .btn:hover { color:var(--white); border-color:var(--blue4); }
        .btn.active { background:var(--blue2); color:var(--white); border-color:var(--blue4); }
        .btn-play { background:none; border:none; color:var(--blue4); cursor:pointer; font-size:1rem; padding:0.2rem 0.3rem; transition:color 0.15s; }
        .btn-play:hover { color:var(--white); }
        .control-row { display:flex; align-items:center; gap:0.4rem; margin:0.3rem 0; padding-left:0.25rem; }
        .control-label { font-size:0.65rem; color:var(--blue3); min-width:3.5rem; font-family:'DM Mono',monospace; }
        .group-box { background:rgba(26,45,66,0.5); border:1px solid var(--blue2); border-radius:12px; padding:0.75rem; margin-bottom:1rem; }
        .group-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.5rem; font-size:0.7rem; color:var(--blue3); text-transform:uppercase; letter-spacing:0.1em; font-family:'DM Mono',monospace; }
        .now-playing { display:flex; align-items:center; gap:0.75rem; margin:0.5rem 0; }
        .now-playing img { width:48px; height:48px; border-radius:6px; }
        .now-playing-info { flex:1; min-width:0; }
        .now-playing-title { font-size:0.8rem; color:var(--white); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .now-playing-artist { font-size:0.7rem; color:var(--blue4); }
        footer { text-align:center; padding:2rem 1rem; color:var(--blue3); font-size:0.85rem; border-top:1px solid var(--blue1); }
        footer a { transition:color 0.2s; text-decoration:none; }
        footer a:hover { color:var(--white); }
        @media(max-width:600px) { header { flex-direction:column; align-items:flex-start; } }
    </style>
</head>
<body>
    <header>
        <a href="/" style="text-decoration:none;color:inherit;">
            <div class="header-brand">
                <img src="favicon.svg" alt="Tommy Skogstad">
                <div class="header-brand-text">
                    <div class="header-brand-name">Tommy Skogstad</div>
                    <div class="header-brand-sep"></div>
                    <div class="header-brand-sub">ingenior · data · elektro · ledelse · produktutvikling</div>
                </div>
            </div>
        </a>
        <nav class="header-nav">
            <a href="/">Dashboard</a>
            <a href="status.html">Status</a>
            <a href="audio.html" class="active">Audio</a>
            <a href="heating.html">Varme &amp; Sikkerhet</a>
            <a href="bookmarks.html">Bokmerker</a>
        </nav>
    </header>

    <main>
        <section class="section">
            <div class="section-header">
                <h2>Bluesound Multi-Room</h2>
                <span class="badge" id="refresh-badge">Laster...</span>
            </div>
            <div id="speakers-container"></div>
        </section>
    </main>

    <footer>
        <div style="margin-bottom:1rem;"><strong style="color:var(--white);">Tommy Skogstad</strong></div>
        <div style="display:flex;justify-content:center;gap:1.5rem;flex-wrap:wrap;margin-bottom:1rem;">
            <a href="tel:+4748061560" style="color:var(--blue4);">48 06 15 60</a>
            <a href="mailto:tommyskogstad@gmail.com" style="color:var(--blue4);">tommyskogstad@gmail.com</a>
        </div>
    </footer>

    <script>
    var API = 'http://nuc.tommy.tv:8851';
    var refreshTimer;

    function cmd(key, action) { return fetch(API+'/api/speaker/'+key+'/'+action,{method:'POST'}).then(function(){setTimeout(loadAudio,800);}); }
    function vol(key, level) { return fetch(API+'/api/speaker/'+key+'/volume/'+level,{method:'POST'}).then(function(){setTimeout(loadAudio,500);}); }
    function inp(key, source) { return fetch(API+'/api/speaker/'+key+'/input/'+source,{method:'POST'}).then(function(){setTimeout(loadAudio,800);}); }
    function mode(key, m) { return fetch(API+'/api/speaker/'+key+'/mode/'+m,{method:'POST'}).then(function(){setTimeout(loadAudio,500);}); }
    function grp(master, slave) { return fetch(API+'/api/speaker/'+master+'/group/'+slave,{method:'POST'}).then(function(){setTimeout(loadAudio,2000);}); }
    function ungrp(master, slave) { return fetch(API+'/api/speaker/'+master+'/ungroup/'+slave,{method:'POST'}).then(function(){setTimeout(loadAudio,2000);}); }
    function ungrpAll(master) { return fetch(API+'/api/speaker/'+master+'/ungroup-all',{method:'POST'}).then(function(){setTimeout(loadAudio,2000);}); }
    function grpAll(master) { return fetch(API+'/api/speaker/'+master+'/group-all',{method:'POST'}).then(function(){setTimeout(loadAudio,2000);}); }
    function resync(master) { return fetch(API+'/api/speaker/'+master+'/resync',{method:'POST'}).then(function(){setTimeout(loadAudio,3000);}); }
    function slp(key, min) { return fetch(API+'/api/speaker/'+key+'/sleep/'+min,{method:'POST'}); }
    function shuf(key) { return fetch(API+'/api/speaker/'+key+'/shuffle',{method:'POST'}).then(function(){setTimeout(loadAudio,500);}); }
    function rep(key) { return fetch(API+'/api/speaker/'+key+'/repeat',{method:'POST'}).then(function(){setTimeout(loadAudio,500);}); }

    function renderSpeaker(s, isSlave) {
        var isPlaying = s.state==='play'||s.state==='stream';
        var cls = 'speaker-card' + (isSlave?' is-slave':'') + (s.slaves&&s.slaves.length?' is-master':'') + (isPlaying?' is-playing':'');
        // Innganger kommer nå som {id, label} fra API
        var html = '<div class="'+cls+'">';

        // Header
        html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.4rem;">';
        html += '<div style="display:flex;align-items:center;gap:0.5rem;"><span style="color:'+(isPlaying?'#6D8345':'var(--blue3)')+';">♪</span>';
        html += '<span style="font-size:0.9rem;font-weight:500;color:var(--white);">'+s.name+'</span>';
        html += '<span style="font-size:0.6rem;color:var(--blue3);">'+(s.model||'')+'</span></div>';
        if (!isSlave && s.slaves && s.slaves.length) {
            html += '<button class="btn" onclick="ungrpAll(\''+s.key+'\')">Oppløs gruppe</button>';
        }
        html += '</div>';

        // Nå spilles
        if (s.artist || s.title) {
            html += '<div class="now-playing">';
            if (s.image) {
                var imgUrl = s.image.startsWith('/') ? 'http://'+s.ip+':11000'+s.image : s.image;
                html += '<img src="'+imgUrl+'" alt="" onerror="this.style.display=\'none\'">';
            }
            html += '<div class="now-playing-info"><div class="now-playing-title">'+(s.artist||'')+'</div>';
            html += '<div class="now-playing-artist">'+(s.album||s.title||'')+'</div></div></div>';
        }

        // Transport + shuffle/repeat
        html += '<div class="control-row" style="gap:0.2rem;">';
        html += '<button class="btn-play" onclick="cmd(\''+s.key+'\',\'back\')">⏮</button>';
        html += '<button class="btn-play" style="font-size:1.4rem;" onclick="cmd(\''+s.key+'\',\''+(isPlaying?'pause':'play')+'\')">'+(isPlaying?'⏸':'▶')+'</button>';
        html += '<button class="btn-play" onclick="cmd(\''+s.key+'\',\'skip\')">⏭</button>';
        html += '<span style="width:0.75rem;"></span>';
        html += '<button class="btn'+(s.shuffle?' active':'')+'" onclick="shuf(\''+s.key+'\')">Shuffle</button>';
        html += '<button class="btn'+(s.repeat?' active':'')+'" onclick="rep(\''+s.key+'\')">Repeat</button>';
        html += '</div>';

        // Sleep
        html += '<div class="control-row">';
        html += '<span class="control-label">Sleep</span>';
        [15,30,60,90,0].forEach(function(m) {
            html += '<button class="btn" onclick="slp(\''+s.key+'\','+m+')">'+(m?m+'m':'Av')+'</button>';
        });
        html += '</div>';

        // Volum
        html += '<div class="control-row">';
        html += '<span class="control-label">Volum '+s.volume+'%</span>';
        html += '<button class="btn" onclick="vol(\''+s.key+'\',Math.max(0,'+s.volume+'-5))">−</button>';
        [5,15,30,50,75].forEach(function(v) {
            html += '<button class="btn" onclick="vol(\''+s.key+'\','+v+')">'+v+'</button>';
        });
        html += '<button class="btn" onclick="vol(\''+s.key+'\',Math.min(100,'+s.volume+'+5))">+</button>';
        html += '</div>';

        // Inngang
        if (s.inputs && s.inputs.length) {
            html += '<div class="control-row">';
            var iconMap = {tv:'📺',vinyl:'🎵',laptop:'💻',speaker:'🔊',optical:'🔵',bt:'📶',cable:'🔌'};
            html += '<span class="control-label">Inngang</span>';
            s.inputs.forEach(function(i) {
                var inputId = i.id || i;
                var inputLabel = i.label || i;
                var icon = iconMap[i.icon] || '';
                var isActive = s.activeInput && s.activeInput.toLowerCase() === inputId.toLowerCase();
                html += '<button class="btn'+(isActive?' active':'')+'" onclick="inp(\''+s.key+'\',\''+inputId+'\')">'+(icon?icon+' ':'')+inputLabel+'</button>';
            });
            html += '</div>';
        }

        // Modus (soundbar)
        if (s.isSoundbar) {
            html += '<div class="control-row">';
            html += '<span class="control-label">Modus</span>';
            ['off','music','movie','night'].forEach(function(m) {
                var labels = {off:'Off',music:'Musikk',movie:'Film',night:'Natt'};
                var act = s.mode===m?' active':'';
                html += '<button class="btn'+act+'" onclick="mode(\''+s.key+'\',\''+m+'\')">'+labels[m]+'</button>';
            });
            html += '</div>';
        }

        html += '</div>';
        return html;
    }

    function loadAudio() {
        fetch(API+'/api/speakers/status')
            .then(function(r){return r.json();})
            .then(function(speakers) {
                document.getElementById('refresh-badge').textContent = 'Oppdatert '+new Date().toLocaleTimeString('nb-NO',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
                var container = document.getElementById('speakers-container');
                var html = '';

                // Finn grupper (masters med slaves)
                var masters = speakers.filter(function(s){return s.slaves&&s.slaves.length>0;});
                var slaveIps = {};
                masters.forEach(function(m){m.slaves.forEach(function(ip){slaveIps[ip]=m.key;});});
                var ungrouped = speakers.filter(function(s){return !s.isSlave&&(!s.slaves||!s.slaves.length);});

                // Render grupper
                masters.forEach(function(m) {
                    html += '<div class="group-box">';
                    html += '<div class="group-header"><span>Gruppe: '+m.name+' ('+m.slaves.length+' slaver)</span><div style="display:flex;gap:0.3rem;"><button class="btn" onclick="resync(\''+m.key+'\')">Resync</button><button class="btn" onclick="ungrpAll(\''+m.key+'\')">Oppløs</button></div></div>';
                    html += renderSpeaker(m, false);
                    m.slaves.forEach(function(slaveIp) {
                        var slave = speakers.find(function(s){return s.ip===slaveIp;});
                        if (slave) html += renderSpeaker(slave, true);
                    });
                    html += '</div>';
                });

                // Render ugrupperte
                ungrouped.forEach(function(s) {
                    html += renderSpeaker(s, false);
                });

                // Drop-sone for gruppering
                // Gruppering
                html += '<div style="margin-top:1rem;border-top:1px solid var(--blue1);padding-top:1rem;">';
                html += '<div style="font-size:0.7rem;color:var(--blue3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.5rem;font-family:\'DM Mono\',monospace;">Grupper høyttalere</div>';
                html += '<div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;">';
                html += '<select id="master-select" style="font-family:\'DM Mono\',monospace;font-size:0.75rem;background:var(--navy);border:1px solid var(--blue2);color:var(--blue5);padding:0.3rem 0.5rem;border-radius:4px;">';
                html += '<option value="">Master...</option>';
                speakers.forEach(function(s){if(!s.isSlave) html += '<option value="'+s.key+'">'+s.name+'</option>';});
                html += '</select>';
                html += '<span style="color:var(--blue3);font-size:0.7rem;">+</span>';
                html += '<select id="slave-select" style="font-family:\'DM Mono\',monospace;font-size:0.75rem;background:var(--navy);border:1px solid var(--blue2);color:var(--blue5);padding:0.3rem 0.5rem;border-radius:4px;">';
                html += '<option value="">Slave...</option>';
                speakers.forEach(function(s){if(!s.isSlave) html += '<option value="'+s.key+'">'+s.name+'</option>';});
                html += '</select>';
                html += '<button class="btn" style="font-size:0.75rem;padding:0.3rem 0.8rem;" onclick="var m=document.getElementById(\'master-select\').value,s=document.getElementById(\'slave-select\').value;if(m&&s&&m!==s)grp(m,s);">Grupper</button>';
                html += '</div>';
                html += '<div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.75rem;">';
                html += '<span style="font-size:0.7rem;color:var(--blue3);line-height:2;">Grupper alle med:</span>';
                speakers.forEach(function(s) {
                    if (!s.isSlave) html += '<button class="btn" onclick="grpAll(\''+s.key+'\')">'+s.name+'</button>';
                });
                html += '</div></div>';

                container.innerHTML = html;

            })
            .catch(function() {
                document.getElementById('refresh-badge').textContent = 'Feil ved lasting';
            });
    }

    loadAudio();
    refreshTimer = setInterval(loadAudio, 5000);
    </script>
</body>
</html>
